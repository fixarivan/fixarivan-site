        // Переключение языка
        function switchLanguage(lang) {
            currentLanguage = lang;
            
            // Обновляем активную кнопку
            document.querySelectorAll('.language-switcher button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Обновляем тексты
            Object.keys(translations[lang]).forEach(key => {
                const elements = document.querySelectorAll(`[data-lang="${key}"]`);
                elements.forEach(el => {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        el.placeholder = translations[lang][key];
                    } else {
                        el.textContent = translations[lang][key];
                    }
                });
            });
        }

        // Инициализация canvas для графического пароля
        function initPatternCanvas() {
            const canvas = document.getElementById('patternCanvas');
            const ctx = canvas.getContext('2d');
            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            function startDrawing(e) {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                lastX = e.clientX - rect.left;
                lastY = e.clientY - rect.top;
            }

            function draw(e) {
                if (!isDrawing) return;
                
                const rect = canvas.getBoundingClientRect();
                const currentX = e.clientX - rect.left;
                const currentY = e.clientY - rect.top;

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(currentX, currentY);
                ctx.strokeStyle = '#667eea';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.stroke();

                lastX = currentX;
                lastY = currentY;
            }

            function stopDrawing() {
                if (isDrawing) {
                    isDrawing = false;
                    patternDrawn = true;
                    patternData = canvas.toDataURL();
                }
            }
        }

        function clearPattern() {
            const canvas = document.getElementById('patternCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            patternDrawn = false;
            patternData = '';
        }

        // Генерация уникального кода
        function generateUniqueCode() {
            const timestamp = new Date().toISOString().replace(/[-:T]/g, '').slice(0, 14);
            const random = Math.random().toString(36).substr(2, 4).toUpperCase();
            return `FIX-${timestamp}-${random}`;
        }

        // Генерация ссылки для клиента
        function generateClientLink() {
            if (!lastClientToken) {
                alert('Сначала создайте акт. Ссылка для клиента будет доступна после сохранения.');
                return;
            }

            const baseUrl = new URL('../order_view.php', window.location.href).toString();
            const link = `${baseUrl}?token=${encodeURIComponent(lastClientToken)}&lang=${encodeURIComponent(currentLanguage)}`;
            
            navigator.clipboard.writeText(link).then(() => {
                alert('Ссылка скопирована в буфер обмена!');
            }).catch(() => {
                prompt('Скопируйте ссылку:', link);
            });
        }

        function openClientViewer() {
            if (!lastClientToken) {
                alert('Сначала создайте акт.');
                return;
            }
            const baseUrl = new URL('../order_view.php', window.location.href).toString();
            const link = `${baseUrl}?token=${encodeURIComponent(lastClientToken)}&lang=${encodeURIComponent(currentLanguage)}`;
            window.open(link, '_blank');

            const response = await fetch(url, options);
            const text = await response.text();
            if (!response.ok) {
                const snippet = (text || '').trim().slice(0, 200);
                throw new Error(snippet || `HTTP ${response.status}`);
            }
            try {
                return JSON.parse(text);
            } catch (error) {
                const snippet = (text || '').trim().slice(0, 200);
                throw new Error(snippet || 'Сервер вернул некорректный ответ');
            }
        });

        const getInputValue = (id, fallback = '') => {
            const el = document.getElementById(id);
            if (!el) return fallback;
            return typeof el.value === 'string' ? el.value.trim() : fallback;
        };

        async function generateClientAct(documentId) {
            try {
                const result = await fetchJson('../api/generate_beautiful_client_act.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        documentId,
                        documentType: 'order',
                        language: currentLanguage
                    })
                });
                if (result.success) {
                    const link = result.pdf_url || result.download_url;
                    if (link) {
                        window.open(link, '_blank');
                    } else {
                        showMessage('PDF успешно создан, но ссылка не получена', 'success');
                    }
                } else {
                    throw new Error(result.message || 'Ошибка генерации PDF');
                }
            } catch (error) {
                console.error('PDF generation error:', error);
                showMessage(`${translations[currentLanguage].error_message}: ${error.message}`, 'error');
            }
        }

        // Обработка отправки формы
        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = e.target.querySelector('.btn');
            submitBtn.disabled = true;
            const originalText = submitBtn.textContent;
            submitBtn.textContent = translations[currentLanguage].submit_order + '...';

            const documentId = document.getElementById('documentId').value;
            const uniqueCode = generateUniqueCode();
            document.getElementById('uniqueCode').textContent = uniqueCode;

            const today = new Date().toISOString().split('T')[0];
            const formData = {
                documentId,
                clientName: getInputValue('clientName'),
                clientPhone: getInputValue('clientPhone'),
                clientEmail: getInputValue('clientEmail'),
                deviceType: getInputValue('deviceType'),
                deviceModel: getInputValue('deviceModel'),
                serialNumber: getInputValue('deviceSerial'),
                devicePassword: getInputValue('devicePassword'),
                problemDescription: getInputValue('deviceProblem'),
                deviceCondition: getInputValue('externalCondition'),
                accessories: getInputValue('accessories'),
                placeOfAcceptance: getInputValue('location', 'FixariVan, Turku') || 'FixariVan, Turku',
                dateOfAcceptance: today,
                workDate: today,
                patternData: patternData || null,
                clientConsent: document.getElementById('clientConsent')?.checked ?? false,
                uniqueCode,
                language: currentLanguage,
                isMasterForm: true
            };

            try {
                const result = await fetchJson('../api/save_order_fixed.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                if (!result.success) {
                    throw new Error(result.message || translations[currentLanguage].error_message);
                }

                showMessage(translations[currentLanguage].success_message, 'success');
                lastClientToken = result.client_token || '';

                e.target.reset();
                clearPattern();
                patternData = '';
                patternDrawn = false;
                const newDocumentId = generateDocumentId();
                document.getElementById('documentId').value = newDocumentId;
                const newUniqueCode = generateUniqueCode();
                document.getElementById('uniqueCode').textContent = newUniqueCode;
            } catch (error) {
                console.error('Error:', error);
                showMessage(`${translations[currentLanguage].error_message}: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = translations[currentLanguage].submit_order;
            }
        });

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', function() {
            initPatternCanvas();
            document.getElementById('documentId').value = generateDocumentId();
            document.getElementById('uniqueCode').textContent = generateUniqueCode();
        });
    </script>
</body>
</html>
