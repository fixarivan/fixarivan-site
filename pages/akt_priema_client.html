<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Акт приёма техники (Клиент) - FixariVan</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .form-container {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .form-section h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: 600;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
        }

        .form-group.full-width {
            flex: 100%;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .signature-section {
            background: #fff;
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .signature-canvas {
            border: 2px solid #ddd;
            border-radius: 8px;
            margin: 15px 0;
            cursor: crosshair;
            background: white;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 20px 0;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
            border-left: 4px solid #ffc107;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-top: 2px;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: 500;
            color: #856404;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
        }

        .message-box.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message-box.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .language-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            z-index: 1000;
        }

        .language-switcher button {
            padding: 10px 15px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .language-switcher button.active {
            background: #667eea;
            color: white;
        }

        .language-switcher button:hover {
            background: #f0f0f0;
        }

        .language-switcher button.active:hover {
            background: #5a6fd8;
        }

        .company-info {
            background: #e8f5e8;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #4caf50;
            text-align: center;
        }

        .company-info h4 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .company-info p {
            color: #388e3c;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            
            .container {
                margin: 10px;
                border-radius: 10px;
            }
            
            .form-container {
                padding: 20px;
            }
            
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="language-switcher">
        <button onclick="switchLanguage('ru')" class="active">RU</button>
        <button onclick="switchLanguage('en')">EN</button>
        rent="button" onclick="switchLanguage('fi')">FI</button>
    </div>

    <div class="container">
        <div class="header">
            <h1 data-lang="title">АКТ ПРИЁМА ТЕХНИКИ</h1>
            <p data-lang="subtitle">Заполняется клиентом</p>
        </div>

        <div class="form-container">
            <!-- Информация о компании -->
            <div class="company-info">
                <h4 data-lang="company_name">FixariVan</h4>
                <p data-lang="company_info">Сервисный центр по ремонту электроники</p>
                <p data-lang="y_tunnus">Y-tunnus: 3526510-5</p>
            </div>

            <form id="orderForm">
                <!-- Информация о клиенте -->
                <div class="form-section">
                    <h3 data-lang="client_info">Информация о клиенте</h3>
                    <div class="form-group full-width">
                        <label data-lang="document_id">Номер документа</label>
                        <input type="text" id="documentId" name="documentId" readonly>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label data-lang="client_name">ФИО клиента *</label>
                            <input type="text" id="clientName" name="clientName" required>
                        </div>
                        <div class="form-group">
                            <label data-lang="client_phone">Телефон *</label>
                            <input type="tel" id="clientPhone" name="clientPhone" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label data-lang="client_email">Email</label>
                            <input type="email" id="clientEmail" name="clientEmail">
                        </div>
                        <div class="form-group">
                            <label data-lang="location">Местоположение</label>
                            <input type="text" id="location" name="location" value="FixariVan Service" readonly>
                        </div>
                    </div>
                </div>

                <!-- Информация об устройстве -->
                <div class="form-section">
                    <h3 data-lang="device_info">Информация об устройстве</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label data-lang="device_type">Тип устройства *</label>
                            <select id="deviceType" name="deviceType" required>
                                <option value="">Выберите тип</option>
                                <option value="mobile" data-lang="mobile">Смартфон</option>
                                <option value="tablet" data-lang="tablet">Планшет</option>
                                <option value="laptop" data-lang="laptop">Ноутбук</option>
                                <option value="pc" data-lang="pc">Компьютер</option>
                                <option value="other" data-lang="other">Другое</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label data-lang="device_model">Модель устройства *</label>
                            <input type="text" id="deviceModel" name="deviceModel" required>
                        </div>
                    </div>
                    <div class="form-group full-width">
                        <label data-lang="device_password">Пароль / Графический ключ</label>
                        <input type="text" id="devicePassword" name="devicePassword" placeholder="Укажите пароль или опишите графический ключ">
                    </div>
                    <div class="form-group full-width">
                        <label data-lang="device_problem">Описание проблемы *</label>
                        <textarea id="deviceProblem" name="deviceProblem" required placeholder="Опишите проблему с вашим устройством"></textarea>
                    </div>
                </div>

                <!-- Цифровая подпись -->
                <div class="form-section">
                    <h3 data-lang="digital_signature">Цифровая подпись клиента</h3>
                    <div class="signature-section">
                        <p data-lang="sign_here">Подпишите здесь:</p>
                        <canvas id="signatureCanvas" class="signature-canvas" width="400" height="200"></canvas>
                        <button type="button" onclick="clearSignature()" data-lang="clear_signature">Очистить подпись</button>
                    </div>
                </div>

                <!-- Согласие клиента -->
                <div class="checkbox-group">
                    <input type="checkbox" id="clientConsent" name="clientConsent" required>
                    <label for="clientConsent" data-lang="client_consent">Я подтверждаю, что устройство принято на диагностику. FixariVan не несёт ответственности за данные, оставшиеся на устройстве. Я подтверждаю, что резервная копия данных выполнена. В случае отказа от ремонта может взиматься плата за диагностику.</label>
                </div>

                <button type="submit" class="btn" data-lang="submit_order">Создать акт приёма</button>
                <div id="messageBox" class="message-box"></div>
            </form>
        </div>
    </div>

    <script>
        let currentLanguage = 'ru';
        let signatureDrawn = false;
        let signatureData = '';
        const urlParams = new URLSearchParams(window.location.search);
        const incomingToken = urlParams.get('token');
        const incomingDocumentId = urlParams.get('documentId');

        // Client must access only by token. Redirect to the unified readonly viewer.
        if (incomingToken) {
            const l = urlParams.get('lang') || 'ru';
            window.location.replace(`../order_view.php?token=${encodeURIComponent(incomingToken)}&lang=${encodeURIComponent(l)}`);
        }

        // Переводы
        const translations = {
            ru: {
                title: 'АКТ ПРИЁМА ТЕХНИКИ',
                subtitle: 'Заполняется клиентом',
                company_name: 'FixariVan',
                company_info: 'Сервисный центр по ремонту электроники',
                y_tunnus: 'Y-tunnus: 3526510-5',
                document_id: 'Номер документа',
                client_info: 'Информация о клиенте',
                client_name: 'ФИО клиента',
                client_phone: 'Телефон',
                client_email: 'Email',
                location: 'Местоположение',
                device_info: 'Информация об устройстве',
                device_type: 'Тип устройства',
                device_model: 'Модель устройства',
                device_password: 'Пароль / Графический ключ',
                device_problem: 'Описание проблемы',
                digital_signature: 'Цифровая подпись клиента',
                sign_here: 'Подпишите здесь:',
                clear_signature: 'Очистить подпись',
                client_consent: 'Я подтверждаю, что устройство принято на диагностику. FixariVan не несёт ответственности за данные, оставшиеся на устройстве. Я подтверждаю, что резервная копия данных выполнена. В случае отказа от ремонта может взиматься плата за диагностику.',
                submit_order: 'Создать акт приёма',
                mobile: 'Смартфон',
                tablet: 'Планшет',
                laptop: 'Ноутбук',
                pc: 'Компьютер',
                other: 'Другое',
                success_message: 'Акт приёма успешно создан! PDF готовится к скачиванию...',
                error_message: 'Ошибка при создании акта',
                signature_required: 'Пожалуйста, поставьте цифровую подпись.',
                consent_required: 'Необходимо согласиться с условиями.'
            },
            en: {
                title: 'EQUIPMENT ACCEPTANCE ACT',
                subtitle: 'Filled by client',
                company_name: 'FixariVan',
                company_info: 'Electronics repair service center',
                y_tunnus: 'Y-tunnus: 3526510-5',
                document_id: 'Document ID',
                client_info: 'Client Information',
                client_name: 'Client Full Name',
                client_phone: 'Phone',
                client_email: 'Email',
                location: 'Location',
                device_info: 'Device Information',
                device_type: 'Device Type',
                device_model: 'Device Model',
                device_password: 'Password / Graphic Key',
                device_problem: 'Problem Description',
                digital_signature: 'Client Digital Signature',
                sign_here: 'Sign here:',
                clear_signature: 'Clear signature',
                client_consent: 'I confirm that the device is accepted for diagnostics. FixariVan is not responsible for data remaining on the device. I confirm that data backup has been made. In case of repair refusal, a diagnostic fee may be charged.',
                submit_order: 'Create acceptance act',
                mobile: 'Smartphone',
                tablet: 'Tablet',
                laptop: 'Laptop',
                pc: 'Computer',
                other: 'Other',
                success_message: 'Acceptance act created! Preparing PDF download...',
                error_message: 'Failed to create acceptance act',
                signature_required: 'Please provide a digital signature.',
                consent_required: 'Please agree with the terms.'
            },
            fi: {
                title: 'LAITTEEN VASTANOTTOTODISTUS',
                subtitle: 'Täyttää asiakas',
                company_name: 'FixariVan',
                company_info: 'Elektroniikkakorjauspalvelukeskus',
                y_tunnus: 'Y-tunnus: 3526510-5',
                document_id: 'Asiakirjan numero',
                client_info: 'Asiakkaan tiedot',
                client_name: 'Asiakkaan koko nimi',
                client_phone: 'Puhelin',
                client_email: 'Sähköposti',
                location: 'Sijainti',
                device_info: 'Laitteen tiedot',
                device_type: 'Laitteen tyyppi',
                device_model: 'Laitteen malli',
                device_password: 'Salasana / Graafinen avain',
                device_problem: 'Ongelma kuvaus',
                digital_signature: 'Asiakkaan digitaalinen allekirjoitus',
                sign_here: 'Allekirjoita tähän:',
                clear_signature: 'Tyhjennä allekirjoitus',
                client_consent: 'Vahvistan, että laite on vastaanotettu diagnostiikkaa varten. FixariVan ei ole vastuussa laitteessa säilyvistä tiedoista. Vahvistan, että tiedostojen varmuuskopio on tehty. Korjauksen kieltäytymisestä voidaan periä diagnostiikkamaksu.',
                submit_order: 'Luo vastaanottotodistus',
                mobile: 'Älypuhelin',
                tablet: 'Tabletti',
                laptop: 'Kannettava tietokone',
                pc: 'Tietokone',
                other: 'Muu',
                success_message: 'Vastaanottotodistus luotu! PDF valmistellaan ladattavaksi...',
                error_message: 'Vastaanottotodistuksen luonti epäonnistui',
                signature_required: 'Allekirjoita digitaalinen allekirjoitus.',
                consent_required: 'Hyväksy ehdot.'
            }
        };

        // Переключение языка
        function switchLanguage(lang) {
            currentLanguage = lang;
            
            // Обновляем активную кнопку
            document.querySelectorAll('.language-switcher button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Обновляем тексты
            Object.keys(translations[lang]).forEach(key => {
                const elements = document.querySelectorAll(`[data-lang="${key}"]`);
                elements.forEach(el => {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        el.placeholder = translations[lang][key];
                    } else {
                        el.textContent = translations[lang][key];
                    }
                });
            });
        }

        // Инициализация canvas для подписи
        function initSignatureCanvas() {
            const canvas = document.getElementById('signatureCanvas');
            const ctx = canvas.getContext('2d');
            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            // Поддержка touch событий для мобильных устройств
            canvas.addEventListener('touchstart', handleTouch);
            canvas.addEventListener('touchmove', handleTouch);
            canvas.addEventListener('touchend', stopDrawing);

            function handleTouch(e) {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent(e.type === 'touchstart' ? 'mousedown' : 
                    e.type === 'touchmove' ? 'mousemove' : 'mouseup', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                canvas.dispatchEvent(mouseEvent);
            }

            function startDrawing(e) {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                lastX = e.clientX - rect.left;
                lastY = e.clientY - rect.top;
            }

            function draw(e) {
                if (!isDrawing) return;
                
                const rect = canvas.getBoundingClientRect();
                const currentX = e.clientX - rect.left;
                const currentY = e.clientY - rect.top;

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(currentX, currentY);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.stroke();

                lastX = currentX;
                lastY = currentY;
            }

            function stopDrawing() {
                if (isDrawing) {
                    isDrawing = false;
                    signatureDrawn = true;
                    signatureData = canvas.toDataURL();
                }
            }
        }

        function clearSignature() {
            const canvas = document.getElementById('signatureCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            signatureDrawn = false;
            signatureData = '';
        }

        const fetchJson = window.FixariVan?.http?.fetchJson ?? (async function(url, options = {}) {
            const response = await fetch(url, options);
            const text = await response.text();
            if (!response.ok) {
                const snippet = (text || '').trim().slice(0, 200);
                throw new Error(snippet || `HTTP ${response.status}`);
            }
            try {
                return JSON.parse(text);
            } catch (error) {
                const snippet = (text || '').trim().slice(0, 200);
                throw new Error(snippet || 'Сервер вернул некорректный ответ');
            }
        });

        const getInputValue = (id, fallback = '') => {
            const el = document.getElementById(id);
            if (!el) return fallback;
            return typeof el.value === 'string' ? el.value.trim() : fallback;
        };

        // Обработка отправки формы
        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = e.target.querySelector('.btn');

            if (!signatureDrawn) {
                showMessage(translations[currentLanguage].signature_required, 'error');
                return;
            }

            if (!document.getElementById('clientConsent').checked) {
                showMessage(translations[currentLanguage].consent_required, 'error');
                return;
            }

            submitBtn.disabled = true;
            const originalText = submitBtn.textContent;
            submitBtn.textContent = translations[currentLanguage].submit_order + '...';
            
            const formData = {
                documentId: getInputValue('documentId'),
                clientName: getInputValue('clientName'),
                clientPhone: getInputValue('clientPhone'),
                clientEmail: getInputValue('clientEmail'),
                deviceType: getInputValue('deviceType'),
                deviceModel: getInputValue('deviceModel'),
                devicePassword: getInputValue('devicePassword'),
                problemDescription: getInputValue('deviceProblem'),
                placeOfAcceptance: getInputValue('location', 'FixariVan, Turku') || 'FixariVan, Turku',
                dateOfAcceptance: new Date().toISOString().split('T')[0],
                signatureData: signatureData || null,
                clientConsent: document.getElementById('clientConsent')?.checked ?? false,
                language: currentLanguage,
                isMasterForm: false
            };

            try {
                const result = await fetchJson('../api/save_order_fixed.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                if (!result.success) {
                    throw new Error(result.message || translations[currentLanguage].error_message);
                }

                showMessage(translations[currentLanguage].success_message, 'success');
                await generateClientAct(formData.documentId);

                e.target.reset();
                clearSignature();
                signatureData = '';
                signatureDrawn = false;
                document.getElementById('location').value = 'FixariVan Service';
                if (!incomingDocumentId) {
                    document.getElementById('documentId').value = generateDocumentId();
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage(`${translations[currentLanguage].error_message}: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText.replace('...', '');
            }
        });

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', function() {
            initSignatureCanvas();
            if (incomingDocumentId) {
                document.getElementById('documentId').value = incomingDocumentId;
            } else {
                document.getElementById('documentId').value = generateDocumentId();
            }
        });

        function generateDocumentId() {
            const timestamp = new Date().toISOString().replace(/[-:T]/g, '').slice(0, 14);
            const random = Math.random().toString(36).substr(2, 4).toUpperCase();
            return `CLIENT-${timestamp}-${random}`;
        }

        function showMessage(message, type) {
            const box = document.getElementById('messageBox');
            box.textContent = message;
            box.className = `message-box ${type}`;
            box.style.display = 'block';
        }

        async function generateClientAct(documentId) {
            try {
                const result = await fetchJson('../api/generate_beautiful_client_act.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        documentId: documentId,
                        documentType: 'order',
                        language: currentLanguage
                    })
                });
                if (result.success) {
                    const link = result.pdf_url || result.download_url;
                    if (link) {
                        window.open(link, '_blank');
                    } else {
                        showMessage('PDF успешно создан, но ссылка не получена', 'success');
                    }
                } else {
                    throw new Error(result.message || 'Ошибка генерации PDF');
                }
            } catch (error) {
                console.error('PDF generation error:', error);
                showMessage(`${translations[currentLanguage].error_message}: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
