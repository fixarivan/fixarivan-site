<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FixariVan — CRM клиентов</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="theme-color" content="#070b14">
    <script>window.FIXARIVAN_REQUIRE_ADMIN_SESSION = true;</script>
    <script src="auth_check.js"></script>
    <script src="js/ui_helpers.js"></script>
    <link rel="stylesheet" href="css/fixarivan-theme.css">
    <link rel="stylesheet" href="css/clients-crm.css?v=20250625mobile">
    <link rel="stylesheet" href="mobile_fixes.css?v=20250625mobile">
    <script src="js/clients_crm.js?v=20250625crm"></script>
</head>
<body class="fv-page clients-page">
    <header class="crm-topbar">
        <h1>👥 Клиенты</h1>
        <nav><a href="dashboard_app.html">← Рабочий стол</a></nav>
    </header>

    <div class="crm-workspace">
        <aside class="crm-sidebar">
            <div class="crm-search">
                <input type="search" id="q" placeholder="Поиск: имя, телефон, email, IMEI, заказ, счёт…" autocomplete="off">
                <button type="button" id="btnSearch" title="Найти">🔍</button>
            </div>
            <div class="crm-toolbar">
                <button type="button" class="primary" id="btnNew">+ Новый</button>
                <button type="button" id="btnReload">Обновить</button>
            </div>
            <div class="crm-filters" id="crmFilters">
                <button type="button" class="crm-filter-btn is-active" data-filter="all">Все</button>
                <button type="button" class="crm-filter-btn" data-filter="active">Активные</button>
                <button type="button" class="crm-filter-btn" data-filter="vip">VIP</button>
                <button type="button" class="crm-filter-btn" data-filter="waiting">Ожидают</button>
            </div>
            <div id="clientsList" class="crm-list"><div class="crm-muted">Загрузка…</div></div>
        </aside>

        <main class="crm-profile" id="crmProfile">
            <div class="crm-empty" id="crmEmpty">
                <p>Выберите клиента слева или создайте нового.</p>
                <p class="crm-muted">CRM-профиль: история, устройства, финансы и инсайты.</p>
            </div>
            <div id="crmProfileBody" hidden></div>
        </main>

        <aside class="crm-rail" id="crmRail" hidden></aside>
    </div>

    <form id="clientForm" hidden>
        <input type="hidden" id="fClientId">
        <input type="text" id="fFullName">
        <input type="text" id="fPhone">
        <input type="email" id="fEmail">
        <textarea id="fNotes"></textarea>
        <input type="text" id="fClientIdVisible" disabled>
    </form>

    <script>
    (function () {
        const C = window.FixariVanClientsCrm;
        const fetchJson = window.FixariVan?.http?.fetchJson ?? (async function (url, options = {}) {
            const response = await fetch(url, options);
            const text = await response.text();
            if (!response.ok) throw new Error((text || '').trim().slice(0, 200) || ('HTTP ' + response.status));
            const parsed = JSON.parse(text || '{}');
            if (parsed && parsed.success === false) throw new Error(parsed.message || 'Ошибка запроса');
            return parsed;
        });
        const showToast = window.FixariVan?.ui?.showToast ?? function (m) { alert(m); };
        const fvErr = (e) => (window.FixariVan?.ui?.humanizeApiError ? window.FixariVan.ui.humanizeApiError(e) : (e?.message || String(e)));

        const state = {
            clients: [],
            activeId: '',
            filter: 'all',
            detail: null,
            client: null,
            meta: { v: 1, tier: 'new', tags: [], bullets: [] },
            analytics: null,
        };

        function dataBlock(r) { return (r && typeof r.data === 'object' && r.data) ? r.data : {}; }

        function buildClientQuery() {
            const q = new URLSearchParams();
            const name = (document.getElementById('fFullName').value || '').trim();
            const phone = (document.getElementById('fPhone').value || '').trim();
            const email = (document.getElementById('fEmail').value || '').trim();
            if (name) q.set('client_name', name);
            if (phone) q.set('client_phone', phone);
            if (email) q.set('client_email', email);
            return q.toString();
        }

        function syncFormFromClient(c, notesRaw) {
            document.getElementById('fClientId').value = c.client_id || '';
            document.getElementById('fClientIdVisible').value = c.client_id || '';
            document.getElementById('fFullName').value = c.full_name || '';
            document.getElementById('fPhone').value = c.phone || '';
            document.getElementById('fEmail').value = c.email || '';
            document.getElementById('fNotes').value = notesRaw || '';
        }

        function getNotesForSave() {
            return C.serializeNotes(state.meta, '');
        }

        function filteredClients() {
            return state.clients.filter((c) => {
                const parsed = C.parseNotes(c.notes);
                const tier = parsed.meta.tier;
                const active = Number(c.active_orders_count ?? 0) > 0;
                if (state.filter === 'active') return active;
                if (state.filter === 'vip') return tier === 'vip';
                if (state.filter === 'waiting') return Number(c.waiting_parts_count ?? 0) > 0;
                return true;
            });
        }

        function renderList() {
            const box = document.getElementById('clientsList');
            const rows = filteredClients();
            if (!rows.length) {
                box.innerHTML = '<div class="crm-muted">Клиентов не найдено</div>';
                return;
            }
            box.innerHTML = rows.map((c) => {
                const parsed = C.parseNotes(c.notes);
                const tier = C.tierById(parsed.meta.tier);
                const st = C.listStatus(c, parsed.meta);
                const active = c.client_id === state.activeId ? ' is-active' : '';
                const color = C.avatarColor(c.client_id);
                const ini = C.initials(c.full_name);
                return `<article class="crm-list-card${active}" data-id="${C.esc(c.client_id)}" tabindex="0">
                    <div class="crm-avatar" style="background:${color}">${C.esc(ini)}</div>
                    <div class="crm-list-main">
                        <div class="crm-list-name">${C.esc(c.full_name || 'Без имени')}</div>
                        <div class="crm-list-phone">${C.esc(c.phone || '—')}</div>
                        <div class="crm-list-meta">
                            <span>${C.esc(C.formatRelative(c.updated_at))}</span>
                            <span>📋 ${C.esc(c.orders_count ?? 0)}</span>
                            <span class="crm-tier-pill">${C.esc(tier.label)}</span>
                        </div>
                    </div>
                    <span class="crm-list-badge ${st.cls}">${C.esc(st.label)}</span>
                </article>`;
            }).join('');
            box.querySelectorAll('.crm-list-card[data-id]').forEach((el) => {
                el.addEventListener('click', () => openClient(el.getAttribute('data-id') || ''));
            });
        }

        function invoiceViewerHref(token) {
            const t = String(token || '').trim();
            return t ? ('invoice_view.php?token=' + encodeURIComponent(t)) : '';
        }
        function invoicePortalHref(token) {
            const t = String(token || '').trim();
            return t ? ('client_portal.php?token=' + encodeURIComponent(t)) : '';
        }

        function renderOrderCard(g) {
            const o = g.order || {};
            const oid = String(o.order_id || '').trim();
            const docId = String(o.document_id || '').trim();
            const done = C.orderIsDone(o);
            const trackUrl = 'track.html?q=' + encodeURIComponent(oid || docId);
            const est = g.estimate_total != null ? ('≈ ' + Number(g.estimate_total).toFixed(2) + ' €') : '';
            return `<div class="crm-order-card${done ? ' done' : ''}">
                <div class="crm-order-head">
                    <div>
                        <div class="crm-order-id">${C.esc(oid || docId || '—')}</div>
                        <div class="crm-muted">${C.esc(o.device_model || '—')}${est ? ' • ' + C.esc(est) : ''}</div>
                    </div>
                    <div class="crm-order-badges">
                        <span class="crm-order-badge">${C.esc(o.public_status || o.status || '—')}</span>
                    </div>
                </div>
                <div class="crm-order-actions">
                    <button type="button" class="btn-open-track" data-url="${C.esc(trackUrl)}">Track</button>
                    <button type="button" class="btn-portal-open" data-doc="${C.esc(docId)}" data-oid="${C.esc(oid)}">Портал</button>
                    <button type="button" class="btn-new-order-here" data-q="${C.esc(buildClientQuery())}">+ Заказ</button>
                </div>
            </div>`;
        }

        function renderOrdersHtml(d) {
            const groups = Array.isArray(d.orders_with_docs) ? d.orders_with_docs : [];
            if (groups.length) return groups.map(renderOrderCard).join('');
            const flat = d.history?.orders || [];
            if (!flat.length) return '<p class="crm-muted">Заказов пока нет.</p>';
            return flat.map((o) => renderOrderCard({ order: o, estimate_total: null })).join('');
        }

        function renderProfile() {
            const empty = document.getElementById('crmEmpty');
            const body = document.getElementById('crmProfileBody');
            const rail = document.getElementById('crmRail');
            if (!state.client || !state.activeId) {
                empty.hidden = false;
                body.hidden = true;
                rail.hidden = true;
                return;
            }
            empty.hidden = true;
            body.hidden = false;
            rail.hidden = false;

            const c = state.client;
            const a = state.analytics;
            const meta = state.meta;
            const tier = C.tierById(meta.tier);
            const loyalty = C.loyaltyLevel(a);
            const timeline = C.buildTimeline(state.detail, c);
            const opps = C.buildOpportunities(a, meta);
            const insights = C.buildInsights(c, a, meta);
            const color = C.avatarColor(c.client_id);
            const ini = C.initials(c.full_name);
            const phone = c.phone || '';
            const email = c.email || '';
            const waOk = C.whatsappOk(phone);
            const lang = a.preferredLang ? C.langLabel(a.preferredLang) : '—';
            const firstDate = C.formatDateShort(c.created_at || a.firstOrderDate);
            const lastDate = C.formatDateShort(a.lastOrderDate || c.updated_at);

            const tierButtons = C.TIERS.map((t) =>
                `<button type="button" class="crm-star-btn${meta.tier === t.id ? ' is-active' : ''}" data-tier="${C.esc(t.id)}">${'⭐'.repeat(t.stars)} ${C.esc(t.label)}</button>`
            ).join('');

            const tagChecks = C.TAG_DEFS.map((tag) =>
                `<label class="crm-check"><input type="checkbox" class="crm-tag-check" data-tag="${C.esc(tag.id)}"${meta.tags.includes(tag.id) ? ' checked' : ''}> ${C.esc(tag.label)}</label>`
            ).join('');

            const devicesHtml = a.devices.length
                ? a.devices.map((d) => `<div class="crm-device-card">
                    <div class="crm-device-icon">${C.deviceIcon(d.model, d.type)}</div>
                    <div class="crm-device-name">${C.esc(d.model)}</div>
                    <div class="crm-device-sub">Ремонтов: ${d.repairs.length}<br>Последний: ${C.esc(C.formatDateShort(d.lastDate))}<br>${C.esc(d.lastStatus || '')}</div>
                </div>`).join('')
                : '<p class="crm-muted">Устройства появятся после первого заказа.</p>';

            const notesHtml = (meta.bullets || []).map((b, i) => `<li data-idx="${i}">${C.esc(b)}</li>`).join('');

            const oppHtml = opps.length
                ? opps.map((o) => `<label class="crm-opp-item"><input type="checkbox" class="crm-opp-check" data-opp="${C.esc(o.id)}"${o.checked ? ' checked' : ''}> ${C.esc(o.label)} ${o.suggested ? '<span class="crm-opp-tag">Рекомендуется</span>' : ''}</label>`).join('')
                : '<p class="crm-muted">Рекомендации появятся на основе истории заказов.</p>';

            const tlHtml = timeline.length
                ? timeline.map((e) => `<div class="crm-tl-item"><div class="crm-tl-dot">${C.esc(e.icon)}</div><div><div class="crm-tl-title">${C.esc(e.title)}</div><div class="crm-tl-sub">${C.esc(e.sub)}</div></div></div>`).join('')
                : '<p class="crm-muted">События появятся после заказов.</p>';

            body.innerHTML = `
                <section class="crm-panel">
                    <div class="crm-hero">
                        <div class="crm-hero-avatar" style="background:${color}">${C.esc(ini)}</div>
                        <div>
                            <h2 class="crm-hero-name">${C.esc(c.full_name || '—')}</h2>
                            <div class="crm-hero-badges">
                                <span class="crm-badge crm-badge--vip">${C.esc(tier.label)}</span>
                                ${a.activeCount ? `<span class="crm-badge crm-badge--active">${a.activeCount} в работе</span>` : ''}
                                <span class="crm-badge">${C.esc(loyalty.label)}</span>
                            </div>
                            <div class="crm-hero-contacts">
                                ${phone ? `<a class="crm-contact-chip" href="${C.esc(C.telUrl(phone))}">📞 ${C.esc(phone)}</a>` : ''}
                                ${waOk ? `<a class="crm-contact-chip" href="${C.esc(C.whatsappUrl(phone))}" target="_blank" rel="noopener">💬 WhatsApp</a>` : ''}
                                ${email ? `<a class="crm-contact-chip" href="${C.esc(C.mailUrl(email))}">✉ ${C.esc(email)}</a>` : ''}
                            </div>
                            <div class="crm-hero-meta">
                                Клиент с ${C.esc(firstDate)} · Последний контакт ${C.esc(lastDate)} · Язык: ${C.esc(lang)}
                            </div>
                        </div>
                        <button type="button" class="crm-hero-edit" id="btnToggleEdit">✏️ Редактировать</button>
                    </div>
                    <div class="crm-edit-drawer" id="crmEditDrawer" hidden>
                        <div class="crm-form-grid">
                            <div><label>ФИО</label><input type="text" id="editFullName" value="${C.escAttr(c.full_name || '')}"></div>
                            <div><label>Телефон</label><input type="text" id="editPhone" value="${C.escAttr(c.phone || '')}"></div>
                            <div><label>Email</label><input type="email" id="editEmail" value="${C.escAttr(c.email || '')}"></div>
                            <div><label>Client ID</label><input type="text" value="${C.escAttr(c.client_id || '')}" disabled></div>
                        </div>
                        <div class="crm-form-actions">
                            <button type="button" class="primary" id="btnSaveClient">Сохранить</button>
                            <button type="button" id="btnCancelEdit">Отмена</button>
                            <button type="button" class="danger" id="btnDeleteClient">Удалить клиента</button>
                        </div>
                    </div>
                </section>

                <div class="crm-kpi-row">
                    <div class="crm-kpi"><div class="crm-kpi-val">${a.ordersTotal}</div><div class="crm-kpi-label">Заказов</div></div>
                    <div class="crm-kpi"><div class="crm-kpi-val">${a.activeCount}</div><div class="crm-kpi-label">Активных</div></div>
                    <div class="crm-kpi"><div class="crm-kpi-val">${a.totalRevenue.toFixed(0)} €</div><div class="crm-kpi-label">Сумма заказов</div></div>
                    <div class="crm-kpi"><div class="crm-kpi-val">${a.avgCheck.toFixed(0)} €</div><div class="crm-kpi-label">Средний чек</div></div>
                    <div class="crm-kpi"><div class="crm-kpi-val">${a.completedCount}</div><div class="crm-kpi-label">Завершено</div></div>
                    <div class="crm-kpi"><div class="crm-kpi-val">${a.ltv.toFixed(0)} €</div><div class="crm-kpi-label">LTV</div></div>
                </div>

                <div class="crm-grid-2">
                    <section class="crm-panel">
                        <h3 class="crm-panel-title">⭐ Отношения с клиентом</h3>
                        <div>${tierButtons}</div>
                        <div style="margin-top:10px">${tagChecks}</div>
                    </section>
                    <section class="crm-panel">
                        <h3 class="crm-panel-title">Уровень лояльности</h3>
                        <p class="crm-muted">${C.esc(loyalty.label)} · до ${C.esc(loyalty.next)}${loyalty.need > 0 ? ' ≈ ' + loyalty.need.toFixed(0) + ' €' : ''}</p>
                        <div class="crm-loyalty-bar"><div class="crm-loyalty-fill" style="width:${loyalty.pct}%"></div></div>
                    </section>
                </div>

                <section class="crm-panel">
                    <h3 class="crm-panel-title">📱 Устройства клиента</h3>
                    <div class="crm-devices-scroll">${devicesHtml}</div>
                </section>

                <div class="crm-grid-3">
                    <section class="crm-panel">
                        <h3 class="crm-panel-title">История взаимодействий</h3>
                        <div class="crm-timeline">${tlHtml}</div>
                    </section>
                    <section class="crm-panel">
                        <h3 class="crm-panel-title">📝 Заметки</h3>
                        <ul class="crm-notes-list" id="crmNotesList">${notesHtml || '<li class="crm-muted">Нет заметок</li>'}</ul>
                        <div class="crm-note-add">
                            <input type="text" id="crmNoteInput" placeholder="Добавить заметку…">
                            <button type="button" id="crmNoteAdd">+</button>
                        </div>
                    </section>
                    <section class="crm-panel">
                        <h3 class="crm-panel-title">💡 Возможности</h3>
                        <div class="crm-opp-list">${oppHtml}</div>
                    </section>
                </div>

                <section class="crm-panel crm-orders-wrap">
                    <details open>
                        <summary>📋 Заказы и документы (${a.ordersTotal})</summary>
                        <div id="ordersContainer">${renderOrdersHtml(state.detail)}</div>
                    </details>
                </section>

                <section class="crm-panel" aria-hidden="true">
                    <h3 class="crm-panel-title crm-muted">Будущее развитие</h3>
                    ${C.FUTURE_SLOTS.map((s) => `<div class="crm-future-slot" data-future-slot="${C.esc(s.id)}"><div class="crm-future-slot-title">${C.esc(s.title)}</div><div class="crm-future-slot-hint">${C.esc(s.hint)}</div></div>`).join('')}
                </section>
            `;

            rail.innerHTML = `
                <section class="crm-panel">
                    <h3 class="crm-panel-title">Быстрые действия</h3>
                    <div class="crm-actions-grid">
                        <a class="crm-action-btn${phone ? '' : ' is-disabled'}" href="${C.esc(C.telUrl(phone))}"><span>📞</span><span>Звонок</span></a>
                        <a class="crm-action-btn${waOk ? '' : ' is-disabled'}" href="${C.esc(C.whatsappUrl(phone))}" target="_blank" rel="noopener"><span>💬</span><span>WhatsApp</span></a>
                        <a class="crm-action-btn${email ? '' : ' is-disabled'}" href="${C.esc(C.mailUrl(email))}"><span>✉</span><span>Email</span></a>
                        <a class="crm-action-btn${phone ? '' : ' is-disabled'}" href="${C.esc(C.smsUrl(phone))}"><span>📱</span><span>SMS</span></a>
                    </div>
                    <div style="margin-top:10px">
                        <button type="button" class="crm-action-link" id="btnNewOrderBlank">➕ Создать заказ</button>
                        <button type="button" class="crm-action-link" id="btnNewInvoice">📄 Создать счёт</button>
                        <button type="button" class="crm-action-link" id="btnNewReceipt">🧾 Квитанция</button>
                        <button type="button" class="crm-action-link" id="btnOpenTrack">🔗 Открыть в Track</button>
                    </div>
                </section>
                <section class="crm-panel">
                    <h3 class="crm-panel-title">💶 Финансы клиента</h3>
                    <div class="crm-finance-row"><span>Общая сумма</span><span class="val">${a.totalRevenue.toFixed(2)} €</span></div>
                    <div class="crm-finance-row"><span>Средний чек</span><span class="val">${a.avgCheck.toFixed(2)} €</span></div>
                    <div class="crm-finance-row"><span>Средняя прибыль</span><span class="val">${a.avgProfit.toFixed(2)} €</span></div>
                    <div class="crm-finance-row"><span>Ремонтов</span><span class="val">${a.completedCount}</span></div>
                    <div class="crm-finance-row"><span>Последний ремонт</span><span class="val">${C.esc(C.formatDateShort(a.lastOrderDate))}</span></div>
                    <div class="crm-finance-row"><span>Долг</span><span class="val debt">${a.debt.toFixed(2)} €</span></div>
                    <div class="crm-finance-row"><span>Оплачено вовремя</span><span class="val">${a.onTimePct != null ? a.onTimePct + '%' : '—'}</span></div>
                    <div class="crm-finance-row"><span>Lifetime Value</span><span class="val">${a.ltv.toFixed(2)} €</span></div>
                </section>
                <section class="crm-panel">
                    <h3 class="crm-panel-title">Инсайты</h3>
                    <ul class="crm-insights">${insights.map((x) => `<li>${C.esc(x)}</li>`).join('')}</ul>
                </section>
            `;

            bindProfileEvents();
        }

        async function persistCrmMeta() {
            if (!state.activeId) return;
            document.getElementById('fNotes').value = getNotesForSave();
            const body = {
                action: 'save',
                client_id: state.activeId,
                full_name: document.getElementById('fFullName').value.trim(),
                phone: document.getElementById('fPhone').value.trim(),
                email: document.getElementById('fEmail').value.trim(),
                notes: getNotesForSave(),
            };
            await fetchJson('./api/clients.php', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
        }

        function bindProfileEvents() {
            document.getElementById('btnToggleEdit')?.addEventListener('click', () => {
                const d = document.getElementById('crmEditDrawer');
                if (d) d.hidden = !d.hidden;
            });
            document.getElementById('btnCancelEdit')?.addEventListener('click', () => {
                const d = document.getElementById('crmEditDrawer');
                if (d) d.hidden = true;
            });
            document.getElementById('btnSaveClient')?.addEventListener('click', () => saveClientFromEdit().catch((e) => showToast(fvErr(e), 'error')));
            document.getElementById('btnDeleteClient')?.addEventListener('click', () => deleteClient().catch((e) => showToast(fvErr(e), 'error')));

            document.querySelectorAll('.crm-star-btn[data-tier]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    state.meta.tier = btn.getAttribute('data-tier') || 'new';
                    try {
                        await persistCrmMeta();
                        renderProfile();
                        renderList();
                        showToast('Статус обновлён', 'success');
                    } catch (e) { showToast(fvErr(e), 'error'); }
                });
            });

            document.querySelectorAll('.crm-tag-check').forEach((inp) => {
                inp.addEventListener('change', async () => {
                    const id = inp.getAttribute('data-tag') || '';
                    if (!id) return;
                    if (inp.checked) {
                        if (!state.meta.tags.includes(id)) state.meta.tags.push(id);
                    } else {
                        state.meta.tags = state.meta.tags.filter((t) => t !== id);
                    }
                    try { await persistCrmMeta(); } catch (e) { showToast(fvErr(e), 'error'); }
                });
            });

            document.querySelectorAll('.crm-opp-check').forEach((inp) => {
                inp.addEventListener('change', async () => {
                    const id = inp.getAttribute('data-opp') || '';
                    if (!state.meta.opp) state.meta.opp = [];
                    if (inp.checked) {
                        if (!state.meta.opp.includes(id)) state.meta.opp.push(id);
                    } else {
                        state.meta.opp = state.meta.opp.filter((x) => x !== id);
                    }
                    try { await persistCrmMeta(); } catch (e) { showToast(fvErr(e), 'error'); }
                });
            });

            document.getElementById('crmNoteAdd')?.addEventListener('click', async () => {
                const inp = document.getElementById('crmNoteInput');
                const val = (inp?.value || '').trim();
                if (!val) return;
                if (!state.meta.bullets) state.meta.bullets = [];
                state.meta.bullets.push(val);
                if (inp) inp.value = '';
                try {
                    await persistCrmMeta();
                    renderProfile();
                } catch (e) { showToast(fvErr(e), 'error'); }
            });

            document.getElementById('btnNewOrderBlank')?.addEventListener('click', () => {
                const q = buildClientQuery();
                window.location.href = 'order_new.html' + (q ? ('?' + q) : '');
            });
            document.getElementById('btnNewReceipt')?.addEventListener('click', () => {
                window.location.href = 'receipt.html?' + buildClientQuery();
            });
            document.getElementById('btnNewInvoice')?.addEventListener('click', () => {
                window.location.href = 'invoice.html?' + buildClientQuery();
            });
            document.getElementById('btnOpenTrack')?.addEventListener('click', () => {
                const q = encodeURIComponent(state.client?.full_name || state.activeId || '');
                window.open('track.html?q=' + q, '_blank', 'noopener');
            });
        }

        async function loadClients() {
            const q = (document.getElementById('q').value || '').trim();
            const url = './api/clients.php' + (q ? ('?q=' + encodeURIComponent(q)) : '');
            const r = await fetchJson(url, { credentials: 'same-origin' });
            state.clients = Array.isArray(r.clients) ? r.clients : (Array.isArray(dataBlock(r).clients) ? dataBlock(r).clients : []);
            renderList();
        }

        function resetForm() {
            state.activeId = '';
            state.client = null;
            state.detail = null;
            state.meta = { v: 1, tier: 'new', tags: [], bullets: [] };
            state.analytics = C.computeAnalytics({ history: { orders: [], receipts: [], invoices: [] }, orders_with_docs: [], active_orders: [] });
            syncFormFromClient({ full_name: '', phone: '', email: '' }, '');
            renderProfileNewClient();
            renderList();
        }

        function renderProfileNewClient() {
            const empty = document.getElementById('crmEmpty');
            const body = document.getElementById('crmProfileBody');
            const rail = document.getElementById('crmRail');
            empty.hidden = true;
            body.hidden = false;
            rail.hidden = true;
            body.innerHTML = `
                <section class="crm-panel">
                    <h2 class="crm-hero-name">Новый клиент</h2>
                    <p class="crm-muted">Заполните контакты и сохраните — CRM-профиль создастся автоматически.</p>
                    <div class="crm-edit-drawer" id="crmEditDrawer">
                        <div class="crm-form-grid">
                            <div><label>ФИО *</label><input type="text" id="editFullName" autofocus></div>
                            <div><label>Телефон</label><input type="text" id="editPhone"></div>
                            <div><label>Email</label><input type="email" id="editEmail"></div>
                        </div>
                        <div class="crm-form-actions">
                            <button type="button" class="primary" id="btnSaveClient">Создать клиента</button>
                            <button type="button" id="btnCancelEdit">Отмена</button>
                        </div>
                    </div>
                </section>`;
            document.getElementById('btnSaveClient')?.addEventListener('click', () => saveClientFromEdit().catch((e) => showToast(fvErr(e), 'error')));
            document.getElementById('btnCancelEdit')?.addEventListener('click', () => {
                body.hidden = true;
                empty.hidden = false;
            });
        }

        async function openClient(clientId) {
            if (!clientId) return;
            const r = await fetchJson('./api/clients.php?client_id=' + encodeURIComponent(clientId), { credentials: 'same-origin' });
            const d = dataBlock(r);
            const c = d.client || {};
            state.activeId = c.client_id || clientId;
            state.client = c;
            state.detail = d;
            const parsed = C.parseNotes(c.notes);
            state.meta = parsed.meta;
            state.analytics = C.computeAnalytics(d);
            syncFormFromClient(c, getNotesForSave());
            renderProfile();
            renderList();
        }

        async function saveClientFromEdit() {
            const name = (document.getElementById('editFullName')?.value || '').trim();
            if (!name) { showToast('Нужно указать ФИО', 'warning'); return; }
            document.getElementById('fFullName').value = name;
            document.getElementById('fPhone').value = (document.getElementById('editPhone')?.value || '').trim();
            document.getElementById('fEmail').value = (document.getElementById('editEmail')?.value || '').trim();
            const body = {
                action: 'save',
                client_id: state.activeId || '',
                full_name: name,
                phone: document.getElementById('fPhone').value.trim(),
                email: document.getElementById('fEmail').value.trim(),
                notes: getNotesForSave(),
            };
            const r = await fetchJson('./api/clients.php', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            const cid = String(r.client_id || dataBlock(r).client_id || state.activeId).trim();
            showToast('Клиент сохранён', 'success');
            await loadClients();
            if (cid) await openClient(cid);
        }

        async function deleteClient() {
            const cid = state.activeId;
            if (!cid) return;
            if (!confirm('Удалить клиента ' + cid + '?')) return;
            const pass = prompt('Введите пароль удаления:');
            if (!pass) return;
            const r = await fetchJson('./api/clients.php', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'delete', client_id: cid, delete_password: pass }),
            });
            if (!r.success) { showToast(r.message || 'Ошибка удаления', 'error'); return; }
            showToast('Клиент удалён', 'success');
            resetForm();
            await loadClients();
        }

        async function clientsResolvePortalUrl(docId, orderId) {
            const res = await fetch('./api/order_ensure_token.php', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ documentId: docId || '', orderId: orderId || '' }),
            });
            const json = await res.json();
            if (!json || json.success !== true) return '';
            const d = json.data && typeof json.data === 'object' ? json.data : json;
            return String((d && d.portal_url) ? d.portal_url : '').trim();
        }

        document.getElementById('btnSearch').addEventListener('click', () => loadClients().catch((e) => showToast(fvErr(e), 'error')));
        document.getElementById('q').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadClients().catch((err) => showToast(fvErr(err), 'error'));
        });
        document.getElementById('btnReload').addEventListener('click', () => loadClients().catch((e) => showToast(fvErr(e), 'error')));
        document.getElementById('btnNew').addEventListener('click', resetForm);

        document.getElementById('crmFilters').addEventListener('click', (e) => {
            const btn = e.target.closest('.crm-filter-btn[data-filter]');
            if (!btn) return;
            state.filter = btn.getAttribute('data-filter') || 'all';
            document.querySelectorAll('.crm-filter-btn').forEach((b) => b.classList.toggle('is-active', b === btn));
            renderList();
        });

        document.addEventListener('click', async (e) => {
            const trackBtn = e.target.closest('.btn-open-track');
            if (trackBtn) {
                e.preventDefault();
                const u = trackBtn.getAttribute('data-url');
                if (u) window.open(u, '_blank', 'noopener');
                return;
            }
            const newHere = e.target.closest('.btn-new-order-here');
            if (newHere) {
                e.preventDefault();
                window.location.href = 'order_new.html?' + (newHere.getAttribute('data-q') || '');
                return;
            }
            const open = e.target.closest('.btn-portal-open');
            if (open) {
                e.preventDefault();
                open.disabled = true;
                try {
                    const u = await clientsResolvePortalUrl(open.getAttribute('data-doc') || '', open.getAttribute('data-oid') || '');
                    if (u) window.open(u, '_blank', 'noopener');
                    else showToast('Не удалось получить ссылку', 'error');
                } finally { open.disabled = false; }
            }
        });

        document.addEventListener('DOMContentLoaded', () => loadClients().catch((e) => showToast(fvErr(e), 'error')));
    })();
    </script>
</body>
</html>
