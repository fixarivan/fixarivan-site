name: Deploy FixariVan

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check commit message for [deploy]
        id: check_commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" != *"[deploy]"* ]]; then
            echo "No [deploy] tag found. Skipping deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Deploy tag found."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no deploy tag
        if: steps.check_commit.outputs.skip == 'true'
        run: exit 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_rsa -p 21098 -o BatchMode=yes fixawcab@162.0.217.157 "echo connected"

      # Быстрый путь: клон в REPO → git fetch + deploy (обычно под 1 мин). Иначе: полный scp в tmp_deploy.
      - name: Deploy on server (git fast path or scp fallback)
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          REPO="/home/fixawcab/fixarivan-site"
          BUNDLE="/home/fixawcab/tmp_deploy"

          if ssh -i ~/.ssh/id_rsa -p 21098 -o BatchMode=yes fixawcab@162.0.217.157 "test -d ${REPO}/.git"; then
            echo ">>> Fast deploy: ${REPO}"
            ssh -i ~/.ssh/id_rsa -p 21098 -o BatchMode=yes fixawcab@162.0.217.157 \
              "export GH_SHA=\"${GH_SHA}\"; bash -s" << 'FAST'
          set -euo pipefail
          cd "/home/fixawcab/fixarivan-site"
          git fetch origin main
          git checkout -f main
          git reset --hard origin/main
          if [[ "$(git rev-parse HEAD)" != "${GH_SHA}" ]]; then
            echo "ERROR: HEAD $(git rev-parse HEAD) != ${GH_SHA}" >&2
            exit 1
          fi
          export FIXARIVAN_DEPLOY_ON_SERVER=1
          bash ./deploy.sh
          FAST
          else
            echo ">>> Slow deploy: scp to ${BUNDLE} (one-time: git clone ${REPO} + deploy key — see docs/GIT_DEPLOY_SAFE.md)"
            ssh -i ~/.ssh/id_rsa -p 21098 -o BatchMode=yes fixawcab@162.0.217.157 "mkdir -p ${BUNDLE}"
            scp -r \
              -i ~/.ssh/id_rsa \
              -P 21098 \
              -o BatchMode=yes \
              . \
              fixawcab@162.0.217.157:${BUNDLE}/
            ssh -i ~/.ssh/id_rsa -p 21098 -o BatchMode=yes fixawcab@162.0.217.157 \
              "export GH_SHA=\"${GH_SHA}\"; bash -s" << 'SLOW'
          set -euo pipefail
          cd "/home/fixawcab/tmp_deploy"
          if [[ ! -d .git ]]; then
            echo "ERROR: tmp_deploy missing .git after scp" >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "${GH_SHA}" ]]; then
            echo "ERROR: bundle HEAD $(git rev-parse HEAD) != ${GH_SHA}" >&2
            exit 1
          fi
          export FIXARIVAN_DEPLOY_ON_SERVER=1
          bash ./deploy.sh
          SLOW
          fi

      - name: Verify deployed revision on server
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_rsa -p 21098 -o BatchMode=yes fixawcab@162.0.217.157 \
            "test -f /home/fixawcab/public_html/fixarivan.space/.deploy_revision && grep -qxF \"${GH_SHA}\" /home/fixawcab/public_html/fixarivan.space/.deploy_revision"