name: Deploy FixariVan

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check commit message for [deploy]
        id: check_commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" != *"[deploy]"* ]]; then
            echo "No [deploy] tag found. Skipping deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Deploy tag found."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no deploy tag
        if: steps.check_commit.outputs.skip == 'true'
        run: exit 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_rsa -p 21098 -o BatchMode=yes fixawcab@162.0.217.157 "echo connected"

      # Git-based deploy: clone on server → fetch main → reset to origin/main (must match this push SHA)
      # deploy.sh: backup → rsync (no --delete) → .deploy_revision → chmod
      - name: Deploy on server (git fetch + deploy.sh)
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_rsa -p 21098 -o BatchMode=yes fixawcab@162.0.217.157 \
            "export GH_SHA=\"${GH_SHA}\"; bash -s" << 'REMOTE_EOF'
          set -euo pipefail
          REPO="/home/fixawcab/fixarivan-site"
          if [[ ! -d "${REPO}/.git" ]]; then
            echo "ERROR: No git clone at ${REPO}. On the server once: git clone <your-repo-url> ${REPO} && cd ${REPO} && git checkout main" >&2
            exit 1
          fi
          cd "${REPO}"
          git fetch origin main
          git checkout -f main
          git reset --hard origin/main
          if [[ "$(git rev-parse HEAD)" != "${GH_SHA}" ]]; then
            echo "ERROR: Server HEAD $(git rev-parse HEAD) does not match workflow commit ${GH_SHA} (shallow clone? wrong remote?)" >&2
            exit 1
          fi
          export FIXARIVAN_DEPLOY_ON_SERVER=1
          bash ./deploy.sh
          REMOTE_EOF

      - name: Verify deployed revision on server
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_rsa -p 21098 -o BatchMode=yes fixawcab@162.0.217.157 \
            "test -f /home/fixawcab/public_html/fixarivan.space/.deploy_revision && grep -qxF \"${GH_SHA}\" /home/fixawcab/public_html/fixarivan.space/.deploy_revision"