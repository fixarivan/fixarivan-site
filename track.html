<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FixariVan - Track</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script>window.FIXARIVAN_REQUIRE_ADMIN_SESSION = true;</script>
    <script src="auth_check.js"></script>
    <script src="js/document_manager.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 14px; }
        .top { max-width: 1300px; margin: 0 auto 12px auto; display:flex; justify-content:space-between; align-items:center; gap:10px; }
        .layout { max-width:1300px; margin:0 auto; display:grid; grid-template-columns: 360px 1fr; gap:14px; }
        @media (max-width: 980px){ .layout{ grid-template-columns: 1fr; } }
        .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 12px; padding: 12px; }
        .search-row { display:grid; grid-template-columns: 1fr 1fr auto; gap:8px; margin-bottom:10px; }
        @media (max-width: 760px){ .search-row{ grid-template-columns:1fr; } }
        input { width:100%; background: rgba(0,0,0,0.35); color: inherit; border:1px solid rgba(255,255,255,0.18); border-radius:8px; padding:9px 10px; }
        button { background: rgba(255,255,255,0.08); color: inherit; border:1px solid rgba(255,255,255,0.2); border-radius: 8px; padding:9px 12px; cursor:pointer; }
        .primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); border-color: rgba(96, 165, 250, 0.45); }
        .muted { opacity: .72; font-size: .9rem; }
        .list { max-height: 76vh; overflow:auto; }
        .client-item { border:1px solid rgba(255,255,255,0.09); background: rgba(0,0,0,0.28); border-radius:8px; padding:10px; margin-bottom:8px; cursor:pointer; }
        .client-item.active { outline:1px solid #60a5fa; }
        .stats { display:flex; gap:10px; flex-wrap: wrap; margin-bottom:10px; font-size: .9rem; opacity:.9; }
        .quick-filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
        .quick-filters button.active { background: #2563eb; border-color:#3b82f6; }
        .order-card { border:1px solid rgba(255,255,255,0.10); border-radius:10px; padding:10px; margin-bottom:10px; background: rgba(255,255,255,0.03); }
        .order-card.active { border-color: rgba(59,130,246,0.5); background: rgba(59,130,246,0.08); }
        .order-card.done { border-color: rgba(34,197,94,0.45); background: rgba(34,197,94,0.07); }
        .order-card.wait { border-color: rgba(245,158,11,0.45); background: rgba(245,158,11,0.08); }
        .order-card.issue { border-color: rgba(220,38,38,0.55); background: rgba(220,38,38,0.08); }
        .track-select { max-width: 240px; font-size: .86rem; background: rgba(0,0,0,0.35); color: inherit; border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; padding: 8px 10px; }
        .track-expected-date { max-width: 200px; font-size: .86rem; background: rgba(0,0,0,0.35); color: inherit; border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; padding: 8px 10px; }
        .track-internal { width: 100%; min-height: 56px; font-size: .86rem; margin-top: 8px; }
        .track-comment-grid { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:12px; margin-top:8px; }
        .track-comment-col { min-width: 0; }
        .track-comment-col label { display:block; margin-bottom:4px; }
        .track-comment-col .track-internal { margin-top: 0; min-height: 52px; }
        .track-work-wrap { margin-top:10px; padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04); }
        .track-work-wrap.is-hidden { display:none; }
        .track-work-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px; }
        .track-work-title { font-size:.9rem; font-weight:600; }
        .track-work-hint { font-size:.78rem; opacity:.68; }
        .track-work-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .track-work-input { width:100%; max-width:220px; }
        .track-quick { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .track-quick a { font-size: .82rem; padding: 6px 10px; border-radius: 8px; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: inherit; }
        .order-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px; }
        .badge { padding:3px 8px; border-radius:999px; font-size:.75rem; border:1px solid rgba(255,255,255,0.15); margin-left:4px; }
        .badge.active { background:rgba(59,130,246,0.18); border-color:rgba(59,130,246,0.5);}
        .badge.done { background:rgba(34,197,94,0.18); border-color:rgba(34,197,94,0.5);}
        .badge.wait { background:rgba(245,158,11,0.20); border-color:rgba(245,158,11,0.45);}
        .badge.parts-partial { background:rgba(249,115,22,0.22); border-color:rgba(253,186,116,0.45); color:#ffedd5;}
        .docs { list-style:none; margin:8px 0 0 0; padding:0; }
        .docs li { border-top:1px dashed rgba(255,255,255,0.10); padding:8px 0; }
        .doc-actions { display:flex; gap:6px; flex-wrap: wrap; margin-top:6px; }
        .doc-actions button { padding:6px 8px; font-size:.82rem; }
        .payment-mini { font-size: 0.88rem; margin-top: 4px; opacity: 0.92; }
        .order-lines-box { margin-top:12px; border-top:1px dashed rgba(255,255,255,0.14); padding-top:10px; }
        .order-lines-box .title { font-weight: 600; margin-bottom: 6px; }
        .order-lines-table-wrap { overflow-x: auto; margin-top:8px; }
        .order-lines-table { width:100%; border-collapse: collapse; font-size: .82rem; }
        .order-lines-table th, .order-lines-table td { border:1px solid rgba(255,255,255,0.12); padding:6px 8px; text-align:left; }
        .order-lines-table th { opacity: .85; font-weight: 600; }
        .order-lines-table input[type="text"], .order-lines-table input[type="number"] { width:100%; min-width:0; background: rgba(0,0,0,0.35); color: inherit; border:1px solid rgba(255,255,255,0.18); border-radius:6px; padding:6px 8px; }
        .order-lines-table input.ol-qty { max-width: 72px; }
        .order-lines-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
        .order-lines-stock-hint { font-size: .8rem; opacity: .85; margin-top:6px; }
        .ol-sku-cell { position: relative; vertical-align: top; min-width: 160px; }
        .ol-sku-hint { font-size: .72rem; line-height: 1.25; margin-top: 4px; opacity: .88; word-break: break-word; }
        .ol-sku-dd { display: none; position: absolute; z-index: 30; left: 0; right: 0; top: 100%; margin-top: 2px; max-height: 200px; overflow: auto; background: #0f172a; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; box-shadow: 0 10px 28px rgba(0,0,0,0.45); }
        .ol-sku-dd.is-open { display: block; }
        .ol-sku-dd button { display: block; width: 100%; text-align: left; padding: 7px 9px; font-size: .78rem; line-height: 1.3; border: none; border-bottom: 1px solid rgba(255,255,255,0.08); background: transparent; color: inherit; cursor: pointer; }
        .ol-sku-dd button:last-child { border-bottom: none; }
        .ol-sku-dd button:hover { background: rgba(59,130,246,0.22); }
        .ol-sku-dd .ol-dd-sku { font-weight: 600; opacity: .95; }
        .ol-sku-dd .ol-dd-meta { opacity: .75; font-size: .72rem; margin-top: 2px; }
        @media (max-width: 760px) {
            .track-comment-grid { grid-template-columns: 1fr; }
            .track-work-input { max-width: none; }
        }
    </style>
    <link rel="stylesheet" href="css/fixarivan-theme.css">
    <link rel="stylesheet" href="mobile_fixes.css">
</head>
<body class="fv-page track-page">
    <div class="top">
        <h1 id="trackH1" style="margin:0;">🔍 Track</h1>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <span class="muted track-top-hint" style="font-size:.82rem;max-width:420px;">Интерфейс Track на русском. Язык клиентского портала задаётся в карточке заказа (для каждого заказа отдельно).</span>
            <a href="inventory.html" id="trackNavInventory">Космический склад</a>
            <a href="dashboard_app.html">← <span id="trackNavDash">Рабочий стол</span></a>
        </div>
    </div>

    <div class="layout">
        <aside class="card">
            <div class="search-row" style="grid-template-columns: 1fr auto;">
                <input id="qGlobal" placeholder="Поиск: имя, телефон, устройство, проблема, номер заказа">
                <button id="btnSearch" class="primary">Найти</button>
            </div>
            <div class="quick-filters">
                <button id="fAll" class="active">Все</button>
                <button id="fActive">Активные</button>
                <button id="fWait">Ожидание</button>
                <button id="fDone">Завершённые</button>
            </div>
            <div class="stats">
                <span id="sClients">Клиентов: 0</span>
                <span id="sOrders">Заказов: 0</span>
                <span id="sDocs">Документов: 0</span>
            </div>
            <div id="clientsList" class="list"><div class="muted">Загрузка…</div></div>
        </aside>

        <main class="card">
            <h2 id="clientTitle" style="margin:0 0 8px 0;">Карточка клиента</h2>
            <div id="clientMeta" class="muted" style="margin-bottom:10px;">Выберите клиента слева</div>
            <div id="clientQuickActions" class="track-quick" style="display:none; margin-bottom:12px;"></div>
            <div id="ordersTree"><div class="muted">—</div></div>
        </main>
    </div>

    <script>
        const TRACK_PREF_KEY = 'fixarivan_track_filters_v2';
        const state = { docs: [], groups: [], activeKey: '', mode: 'all' };
        const orderDocDetailFetch = new Map();
        const internalCommentTimers = new Map();
        const publicCommentTimers = new Map();
        const publicEstimatedCostTimers = new Map();
        let qGlobalDebounce = null;

        const TRACK_LANG = {
            h1: '🔍 Track: клиент → заказы → документы',
            navInventory: 'Космический склад',
            navDash: 'Рабочий стол',
            clientQuickNewOrder: 'Новый заказ с этим клиентом',
            clientQuickStock: 'Склад',
            searchPh: 'Поиск: имя, телефон, email, устройство, проблема, заказ, номер акта, комментарии',
            find: 'Найти',
            fAll: 'Все', fActive: 'Активные', fWait: 'Ожидание', fDone: 'Завершённые',
            sClients: 'Клиентов', sOrders: 'Заказов', sDocs: 'Документов',
            clientTitle: 'Карточка клиента', clientPick: 'Выберите клиента слева',
            noneFound: 'Ничего не найдено',
            order: 'Заказ', deviceUnknown: 'Устройство не указано',
            activeBadge: 'активный', doneBadge: 'завершён', waitBadge: 'запчасти в ожидании',
            stClient: 'Статус (клиент):',
            expectedDateLbl: 'Ожидаемая дата (клиент / портал)',
            expectedDateHint: 'Единый источник для портала и напоминания о закупке (календарь). Можно менять в любой момент.',
            expectedDateClear: 'Без даты',
            publicLbl: 'Комментарий для клиента (портал)',
            publicPh: 'Видно клиенту в портале, блок «Комментарий»',
            internalLbl: 'Внутр. комментарий', internalPh: 'Только для мастера, не в портале',
            workCostLbl: 'Стоимость работы (€)',
            workCostPh: 'Например 65',
            workCostHint: 'Единое значение для портала, квитанции и итоговой суммы заказа.',
            noOrderDoc: 'Нет акта заказа — статус недоступен',
            rec: 'Квитанция', inv: 'Счёт', repMob: 'Отчёт (mobile)', repPc: 'Отчёт (PC)',
            portalOpen: 'Открыть портал', portalCopy: 'Скопировать ссылку',
            problemNone: 'Проблема не указана',
            view: 'Просмотр', edit: 'Редактировать', pdf: 'PDF',
            orderLinesTitle: '📋 Позиции заказа',
            orderLinesHint: 'Наименование, количество, закуп / продажа €, артикул (SKU). По совпадению SKU с каталогом склада подставляются название и цены (после ухода с поля артикула или при сохранении). При сохранении SKU сопоставляется с карточкой склада. Галочка «Со склада» — списать с остатка, если SKU найден и хватает количества.',
            orderLinesSupplyHint: 'После «Сохранить позиции» синхронизируются строки склада заказа, заявка на закуп (текст) и каталог под заказ. Напоминание в календаре (AUTO_SUPPLY) создаётся, если у заказа задана ожидаемая дата (поле даты в заказе / портале).',
            orderLinesColName: 'Наименование',
            orderLinesColQty: 'Кол-во',
            orderLinesColPur: 'Закуп €',
            orderLinesColSale: 'Продажа €',
            orderLinesColSku: 'Артикул',
            orderLinesSkuPlaceholder: 'SKU — подсказка из склада',
            orderLinesSkuStock: 'На складе',
            orderLinesSkuNotFound: 'Нет совпадения в каталоге склада',
            orderLinesSkuTypeMore: 'Введите ещё символы для поиска',
            orderLinesColDed: 'Со склада',
            orderLinesAdd: 'Добавить строку',
            orderLinesSave: 'Сохранить позиции',
            orderLinesSaving: 'Сохранение…',
            orderLinesSaved: 'Позиции сохранены',
            partsStatusChip: 'Запчасти',
            partsStWaiting: 'Ожидание запчастей',
            partsStPartial: 'Частично пришло',
            partsStReady: 'Запчасти готовы',
            partsStOrdered: 'Заказано',
            partsStInTransit: 'В пути',
            ordersLbl: 'Заказы', activeLbl: 'Активные', waitLbl: 'Ожидание',
            st_in_progress: 'в работе', st_waiting_parts: 'ожидает запчасть', st_in_transit: 'в пути', st_done: 'готово', st_delivered: 'выдано',
            typeOrder: 'Акт', typeReceipt: 'Квитанция', typeInvoice: 'Счёт', typeReport: 'Отчёт', typeDoc: 'Документ',
        };
        function trackT() { return TRACK_LANG; }

        const esc = (v) => { const d = document.createElement('div'); d.textContent = String(v ?? ''); return d.innerHTML; };
        function trackPartsStatusRu(code) {
            const c = String(code || '').toLowerCase().trim();
            const T = trackT();
            if (!c) return '—';
            const map = {
                waiting: T.partsStWaiting,
                partial: T.partsStPartial,
                ready: T.partsStReady,
                ordered: T.partsStOrdered,
                in_transit: T.partsStInTransit,
            };
            return map[c] || String(code || '');
        }
        function firstOrderLineNameFromJson(raw) {
            try {
                const arr = typeof raw === 'string' ? JSON.parse(raw || '[]') : raw;
                if (!Array.isArray(arr)) return '';
                for (const item of arr) {
                    const name = String(item?.name || item?.title || '').trim();
                    if (name && name !== '—') return name;
                }
            } catch (_) {}
            return '';
        }
        function resolveOrderDisplayName(order) {
            const o = order || {};
            const type = String(o.order_type || 'repair').trim().toLowerCase();
            const deviceModel = String(o.device_model || '').trim();
            const deviceType = String(o.device_type || '').trim();
            const description = String(o.problem_description || '').trim();
            const comment = String(o.public_comment || '').trim();
            const firstLine = firstOrderLineNameFromJson(o.order_lines_json);
            if (type === 'sale') {
                return description || firstLine || 'Продажа';
            }
            if (type === 'custom') {
                if (description && comment) return `${description} — ${comment}`;
                return description || comment || firstLine || 'Нестандартный заказ';
            }
            return deviceModel || deviceType || 'Заказ';
        }
        function resolveTrackCardTitle(order) {
            const o = order || {};
            return resolveOrderDisplayName(o) || String(o.device_model || '').trim() || 'Заказ';
        }
        function resolveTrackCardMeta(order, T) {
            const o = order || {};
            const fallback = (T && T.deviceUnknown) ? T.deviceUnknown : '—';
            const title = resolveTrackCardTitle(o);
            const bits = [];
            const oid = String(o.order_id || '').trim();
            if (oid) bits.push(oid);
            const deviceModel = String(o.device_model || '').trim();
            const description = String(o.problem_description || '').trim();
            if (title !== deviceModel && deviceModel) bits.push(deviceModel);
            if (title !== description && description) bits.push(description);
            return bits.join(' • ') || fallback;
        }
        function normalizeOrderType(order) {
            const raw = String(order?.order_type || '').trim().toLowerCase();
            if (raw === 'sale') return 'sale';
            if (raw === 'custom') return 'custom';
            return 'repair';
        }
        function shouldShowTrackWorkCost(order) {
            const type = normalizeOrderType(order);
            if (type === 'sale') return false;
            if (type === 'repair') return true;
            const cost = String(order?.public_estimated_cost || '').trim();
            const desc = String(order?.problem_description || '').trim();
            const firstLine = firstOrderLineNameFromJson(order?.order_lines_json);
            return cost !== '' || desc !== '' || firstLine !== '';
        }
        function partsStatusBadgeClass(code) {
            const c = String(code || '').toLowerCase().trim();
            if (c === 'ready') return 'done';
            if (c === 'partial') return 'parts-partial';
            if (c === 'waiting' || c === 'ordered' || c === 'in_transit') return 'wait';
            return '';
        }
        function normalizePortalLang(v) {
            const x = String(v || '').toLowerCase().trim();
            return (x === 'en' || x === 'fi' || x === 'ru') ? x : 'ru';
        }
        /** YYYY-MM-DD для input[type=date] из БД или dd.mm.yyyy */
        function toDateInputValue(raw) {
            const s = String(raw || '').trim();
            if (!s) return '';
            const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (m) return `${m[1]}-${m[2]}-${m[3]}`;
            if (/^\d{1,2}\.\d{1,2}\.\d{4}$/.test(s)) {
                const p = s.split('.');
                return `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`;
            }
            return '';
        }
        const jsq = (v) => String(v ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        const isActive = (s) => !['completed','cancelled','done','signed'].includes(String(s || '').toLowerCase());
        const isDone = (s) => ['completed','cancelled','done','signed'].includes(String(s || '').toLowerCase());
        function pubStatusNorm(o) {
            return String(o.order_status || o.public_status || '').toLowerCase().trim();
        }
        function isPublicDone(o) {
            const p = pubStatusNorm(o);
            return p === 'done' || p === 'delivered';
        }
        function isPublicActive(o) {
            return !isPublicDone(o);
        }
        const isPartsWait = (o) => {
            const os = String(o.order_status || o.public_status || '').toLowerCase();
            if (os === 'waiting_parts') return true;
            const status = String(o.status || '').toLowerCase();
            const text = String(o.problem_description || '').toLowerCase();
            return status.includes('part') || status.includes('wait') || status.includes('await') || text.includes('запчаст') || text.includes('part');
        };
        function isOrderIssue(o) {
            if (pubStatusNorm(o) !== 'waiting_parts') return false;
            const exp = String(o.public_expected_date || '').trim();
            if (!exp) return false;
            let t = Date.parse(exp);
            if (Number.isNaN(t) && /^\d{1,2}\.\d{1,2}\.\d{4}$/.test(exp)) {
                const [da, mo, ye] = exp.split('.');
                t = Date.parse(`${ye}-${mo.padStart(2,'0')}-${da.padStart(2,'0')}`);
            }
            if (Number.isNaN(t)) return false;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return t < today.getTime();
        }

        function loadPrefs() {
            try {
                const raw = localStorage.getItem(TRACK_PREF_KEY);
                if (!raw) return;
                const p = JSON.parse(raw);
                if (p && typeof p === 'object') {
                    if (p.qGlobal) document.getElementById('qGlobal').value = String(p.qGlobal);
                    if (['all','active','wait','done'].includes(String(p.mode))) state.mode = String(p.mode);
                }
            } catch (_) {}
        }
        function savePrefs() {
            try {
                localStorage.setItem(TRACK_PREF_KEY, JSON.stringify({
                    qGlobal: document.getElementById('qGlobal').value || '',
                    mode: state.mode
                }));
            } catch (_) {}
        }

        function applyTrackStaticI18n() {
            const T = trackT();
            const h1 = document.getElementById('trackH1');
            if (h1) h1.textContent = T.h1;
            const ni = document.getElementById('trackNavInventory');
            if (ni) ni.textContent = T.navInventory;
            const nd = document.getElementById('trackNavDash');
            if (nd) nd.textContent = T.navDash;
            const q = document.getElementById('qGlobal');
            if (q) q.placeholder = T.searchPh;
            const bs = document.getElementById('btnSearch');
            if (bs) bs.textContent = T.find;
            const fa = document.getElementById('fAll');
            const fac = document.getElementById('fActive');
            const fw = document.getElementById('fWait');
            const fd = document.getElementById('fDone');
            if (fa) fa.textContent = T.fAll;
            if (fac) fac.textContent = T.fActive;
            if (fw) fw.textContent = T.fWait;
            if (fd) fd.textContent = T.fDone;
        }

        function setMode(mode) {
            state.mode = mode;
            ['fAll','fActive','fWait','fDone'].forEach((id) => document.getElementById(id).classList.remove('active'));
            if (mode === 'active') document.getElementById('fActive').classList.add('active');
            else if (mode === 'wait') document.getElementById('fWait').classList.add('active');
            else if (mode === 'done') document.getElementById('fDone').classList.add('active');
            else document.getElementById('fAll').classList.add('active');
            applyTrackStaticI18n();
            savePrefs();
            renderSidebar();
            renderDetails();
        }

        function pickRows(result){
            if (Array.isArray(result?.results)) return result.results;
            if (Array.isArray(result?.data?.results)) return result.data.results;

        function groupDocuments(rows){
            const map = new Map();
            const aliases = new Map();
            const normalizePhone = (v) => String(v || '').replace(/[^\d]/g, '');
            const normalizeEmail = (v) => String(v || '').trim().toLowerCase();
            const normalizeName = (v) => String(v || '').trim().toLowerCase();
            for (const r of rows){
                const cName = String(r.client_name || 'Без имени').trim();
                const cPhone = String(r.client_phone || '').trim();
                const cId = (r.client_id !== null && r.client_id !== undefined && r.client_id !== '') ? ('id:' + String(r.client_id)) : '';
                const pKey = normalizePhone(cPhone);
                const eKey = normalizeEmail(r.client_email || '');
                const nKey = normalizeName(cName);
                const candidates = [];
                if (cId) candidates.push(cId);
                if (pKey) candidates.push('p:' + pKey);
                if (eKey) candidates.push('e:' + eKey);
                if (nKey) candidates.push('n:' + nKey);
                let canonical = '';
                for (const k of candidates) {
                    if (aliases.has(k)) { canonical = aliases.get(k); break; }
                }
                if (!canonical) {
                    canonical = cId || (pKey ? ('p:' + pKey) : (eKey ? ('e:' + eKey) : ('n:' + nKey)));
                }
                for (const k of candidates) aliases.set(k, canonical);
                const cKey = canonical.toLowerCase();
                if (!map.has(cKey)){
                    map.set(cKey, { key:cKey, client_name:cName, client_phone:cPhone, client_email:r.client_email || '', orders:new Map(), docs:0, active:0, wait:0 });
                }
                const g = map.get(cKey);
                if (!g.client_phone && cPhone) g.client_phone = cPhone;
                if (!g.client_email && r.client_email) g.client_email = r.client_email;
                const oKey = String(r.order_id || (r.type === 'order' ? r.document_id : ('NO-' + r.document_id)) || 'UNLINKED').trim();
                if (!g.orders.has(oKey)){
                    g.orders.set(oKey, {
                        order_id:oKey,
                        device_model:r.device_model || '',
                        problem_description:r.problem_description || '',
                        status:r.status || '',
                        order_status:'',
                        parts_status:'',
                        public_expected_date:'',
                        public_comment:'',
                        internal_comment:'',
                        client_token:'',
                        portal_url:'',
                        language: 'ru',
                        documents:[]
                    });
                }
                const o = g.orders.get(oKey);
                if (r.type === 'order'){
                    if (!o.device_model) o.device_model = r.device_model || '';
                    if (!o.problem_description) o.problem_description = r.problem_description || '';
                    if (!o.status) o.status = r.status || '';
                    o.order_status = (r.public_status || r.order_status || o.order_status || '');
                    if (r.parts_status != null && String(r.parts_status).trim() !== '') {
                        o.parts_status = String(r.parts_status);
                    }
                    o.public_expected_date = (r.public_expected_date != null && r.public_expected_date !== '') ? String(r.public_expected_date) : (o.public_expected_date || '');
                    o.public_comment = (r.public_comment != null) ? String(r.public_comment) : (o.public_comment || '');
                    o.internal_comment = (r.internal_comment != null) ? String(r.internal_comment) : (o.internal_comment || '');
                    o.client_token = r.client_token || o.client_token || '';
                    o.portal_url = r.portal_url || o.portal_url || '';
                    o.language = normalizePortalLang(r.language);
                }
                o.documents.push(r);
                if (r.public_expected_date != null && String(r.public_expected_date).trim() !== '') {
                    o.public_expected_date = String(r.public_expected_date);
                }
                g.docs += 1;
            }
            const out = Array.from(map.values()).map((g) => {
                const orders = Array.from(g.orders.values());
                g.active = orders.filter((o) => isPublicActive(o)).length;
                g.wait = orders.filter((o) => isPartsWait(o)).length;
                g.orders = orders.sort((a,b) => String(b.order_id).localeCompare(String(a.order_id)));
                return g;
            });
            return out.sort((a,b) => (b.docs - a.docs));
        }

        function applyModeToOrders(orders){
            if (state.mode === 'active') return orders.filter((o) => isPublicActive(o));
            if (state.mode === 'wait') return orders.filter((o) => isPartsWait(o));
            if (state.mode === 'done') return orders.filter((o) => isPublicDone(o));
            return orders;
        }

        function filterGroups(){
            const qg = (document.getElementById('qGlobal').value || '').trim().toLowerCase();
            let groups = state.groups.map((g) => ({ ...g, orders: applyModeToOrders(g.orders) }));

            if (qg){
                groups = groups.filter((g) => {
                    const hitClient = String(g.client_name).toLowerCase().includes(qg)
                        || String(g.client_phone).toLowerCase().includes(qg)
                        || String(g.client_email || '').toLowerCase().includes(qg);
                    const hitOrder = g.orders.some((o) => {
                        const base = String(o.order_id).toLowerCase().includes(qg)
                            || String(o.device_model).toLowerCase().includes(qg)
                            || String(o.problem_description).toLowerCase().includes(qg)
                            || String(o.public_comment || '').toLowerCase().includes(qg)
                            || String(o.internal_comment || '').toLowerCase().includes(qg);
                        const hitDocs = Array.isArray(o.documents) && o.documents.some((d) =>
                            String(d.document_id || '').toLowerCase().includes(qg)
                            || String(d.display_id || '').toLowerCase().includes(qg)
                        );
                        return base || hitDocs;
                    });
                    return hitClient || hitOrder;
                });
            }
            groups = groups.filter((g) => g.orders.length > 0);
            return groups;
        }

        async function resolvePortalUrl(docId, orderId, existingUrl) {
            let u = String(existingUrl || '').trim();
            if (u !== '') return u;
            if (!docId && !orderId) return '';
            const res = await fetch('./api/order_ensure_token.php', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ documentId: docId || '', orderId: orderId || '' })
            });
            const json = await res.json();
            if (!json || json.success !== true) return '';
            const d = json.data && typeof json.data === 'object' ? json.data : json;
            return String((d && d.portal_url) ? d.portal_url : '').trim();
        }

        function parseOrderLinesFromDoc(doc) {
            const raw = doc.order_lines_json;
            let lines = [];
            if (typeof raw === 'string') {
                try { lines = JSON.parse(raw || '[]'); } catch (_) { lines = []; }
            } else if (Array.isArray(raw)) {
                lines = raw;
            }
            if (!Array.isArray(lines) || lines.length === 0) {
                return [{ name: '', qty: 1, purchase: 0, sale: 0, sku: '', deductFromStock: false }];
            }
            return lines.map((ln) => {
                const fromDone = !!(ln.from_stock || ln.fromStock);
                const lineId = String(ln.line_id || ln.orderLineId || ln.lineId || '').trim();
                return {
                    name: String(ln.name || ln.title || ''),
                    qty: Number(ln.qty ?? ln.quantity ?? 1) || 1,
                    purchase: Number(ln.purchase ?? ln.purchase_price ?? ln.cost ?? 0) || 0,
                    sale: Number(ln.sale ?? ln.sale_price ?? ln.price ?? 0) || 0,
                    sku: String(ln.sku || ''),
                    inventory_item_id: ln.inventory_item_id != null ? ln.inventory_item_id : null,
                    status: String(ln.status || '').trim(),
                    line_id: lineId,
                    fromStockDone: fromDone,
                    deductFromStock: fromDone ? false : !!(ln.deductFromStock ?? ln.deduct_from_stock),
                };
            });
        }

        function orderLineRowHtml(row) {
            const T = trackT();
            const name = esc(row.name || '');
            const qty = row.qty != null ? row.qty : 1;
            const pur = row.purchase != null ? row.purchase : '';
            const sale = row.sale != null ? row.sale : '';
            const sku = esc(row.sku || '');
            const fromDone = !!(row.fromStockDone || row.from_stock || row.fromStock);
            const invId = row.inventory_item_id != null && row.inventory_item_id !== '' ? String(row.inventory_item_id) : '';
            const st = esc(String(row.status || '').trim());
            const lineIdAttr = esc(String(row.line_id || row.lineId || '').trim());
            const ded = fromDone ? ' checked disabled' : (row.deductFromStock ? ' checked' : '');
            const dedTitle = fromDone ? 'Уже списано со склада' : 'Списать со склада при сохранении';
            const skuPh = esc(T.orderLinesSkuPlaceholder || 'SKU');
            return `<tr data-from-stock="${fromDone ? '1' : ''}" data-inv-id="${esc(invId)}" data-line-status="${st}" data-line-id="${lineIdAttr}">
                <td><input type="text" class="ol-name" value="${name}" placeholder="Наименование"></td>
                <td><input type="number" class="ol-qty" min="0.01" step="any" value="${esc(qty)}"></td>
                <td><input type="number" class="ol-purchase" min="0" step="any" value="${esc(pur)}"></td>
                <td><input type="number" class="ol-sale" min="0" step="any" value="${esc(sale)}"></td>
                <td class="ol-sku-cell">
                    <input type="text" class="ol-sku" value="${sku}" placeholder="${skuPh}" autocomplete="off" spellcheck="false"${fromDone ? ' readonly' : ''}>
                    <div class="ol-sku-hint muted" aria-live="polite"></div>
                    <div class="ol-sku-dd" role="listbox"></div>
                </td>
                <td style="text-align:center;"><input type="checkbox" class="ol-deduct" title="${esc(dedTitle)}"${ded}></td>
                <td><button type="button" class="track-order-line-del" title="Удалить">✕</button></td>
            </tr>`;
        }

        function formatSkuRowHint(item) {
            const T = trackT();
            const sku = String(item.sku || '').trim() || '—';
            const nm = String(item.name || '').trim();
            const qty = Number(item.quantity) || 0;
            return `${T.orderLinesSkuStock}: ${qty} шт. · ${sku}${nm ? ' — ' + nm : ''}`;
        }

        /** Поля закупа/продажи из ответа inventory_list (сырой SQLite или нормализованный объект). */
        function inventoryItemCostFields(item) {
            const pur = Number(
                item.default_cost != null && item.default_cost !== ''
                    ? item.default_cost
                    : (item.costPrice != null ? item.costPrice : item.defaultCost)
            ) || 0;
            const sale = Number(
                item.sale_price != null && item.sale_price !== ''
                    ? item.sale_price
                    : (item.sellPrice != null ? item.sellPrice : item.salePrice)
            ) || 0;
            return { pur, sale };
        }

        /** Подставить наименование и цены со склада в строку заказа. */
        function applyInventoryItemToOrderLine(tr, item) {
            if (tr.getAttribute('data-from-stock') === '1') return;
            const nameInp = tr.querySelector('.ol-name');
            const purInp = tr.querySelector('.ol-purchase');
            const saleInp = tr.querySelector('.ol-sale');
            const nm = String(item.name || '').trim();
            const { pur, sale } = inventoryItemCostFields(item);
            if (nameInp) nameInp.value = nm;
            if (purInp) purInp.value = pur > 0 ? String(pur) : '';
            if (saleInp) saleInp.value = sale > 0 ? String(sale) : '';
        }

        async function fetchInventoryTrackSuggest(query) {
            const q = String(query || '').trim();
            if (q.length < 1) return [];
            const params = new URLSearchParams({ q, limit: '30' });
            const res = await fetch('./api/inventory_list.php?' + params.toString(), { credentials: 'same-origin', cache: 'no-store' });
            const json = await res.json();
            if (!json || !json.success) return [];
            return Array.isArray(json.data?.items) ? json.data.items : [];
        }

        async function fetchInventoryItemById(id) {
            const n = parseInt(String(id), 10);
            if (n <= 0) return null;
            const res = await fetch('./api/inventory_list.php?id=' + encodeURIComponent(String(n)), { credentials: 'same-origin', cache: 'no-store' });
            const json = await res.json();
            if (!json || !json.success) return null;
            const items = json.data?.items;
            return Array.isArray(items) && items[0] ? items[0] : null;
        }

        function pickSkuFromInventory(tr, item) {
            const inp = tr.querySelector('.ol-sku');
            const hint = tr.querySelector('.ol-sku-hint');
            const dd = tr.querySelector('.ol-sku-dd');
            if (inp) inp.value = String(item.sku || '').trim();
            tr.setAttribute('data-inv-id', String(item.id));
            applyInventoryItemToOrderLine(tr, item);
            if (hint) hint.textContent = formatSkuRowHint(item);
            if (dd) {
                dd.classList.remove('is-open');
                dd.innerHTML = '';
            }
        }

        function renderSkuDropdown(tr, items) {
            const dd = tr.querySelector('.ol-sku-dd');
            if (!dd) return;
            dd.innerHTML = '';
            const T = trackT();
            if (!items.length) {
                dd.classList.remove('is-open');
                return;
            }
            items.slice(0, 25).forEach((it) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                const sku = String(it.sku || '').trim() || '—';
                const nm = String(it.name || '').trim();
                const qty = Number(it.quantity) || 0;
                btn.innerHTML = `<span class="ol-dd-sku">${esc(sku)}</span><div class="ol-dd-meta">${esc(nm)} · ${esc(T.orderLinesSkuStock)} ${qty} шт.</div>`;
                btn.addEventListener('mousedown', (e) => e.preventDefault());
                btn.addEventListener('click', () => pickSkuFromInventory(tr, it));
                dd.appendChild(btn);
            });
            dd.classList.add('is-open');
        }

        async function refreshSkuHintForRow(tr) {
            const T = trackT();
            const inp = tr.querySelector('.ol-sku');
            const hint = tr.querySelector('.ol-sku-hint');
            if (!inp || !hint) return;
            if (tr.getAttribute('data-from-stock') === '1') {
                const id = parseInt(tr.getAttribute('data-inv-id') || '0', 10);
                if (id > 0) {
                    const it = await fetchInventoryItemById(id);
                    if (it) hint.textContent = formatSkuRowHint(it);
                }
                return;
            }
            let id = parseInt(tr.getAttribute('data-inv-id') || '0', 10);
            const sku = String(inp.value || '').trim();
            if (id > 0) {
                const it = await fetchInventoryItemById(id);
                if (it) {
                    hint.textContent = formatSkuRowHint(it);
                    const nameInp = tr.querySelector('.ol-name');
                    const purInp = tr.querySelector('.ol-purchase');
                    const saleInp = tr.querySelector('.ol-sale');
                    const nm = String(nameInp?.value || '').trim();
                    const pur = parseFloat(String(purInp?.value || '').replace(',', '.')) || 0;
                    const sale = parseFloat(String(saleInp?.value || '').replace(',', '.')) || 0;
                    if (!nm && pur <= 0 && sale <= 0) {
                        applyInventoryItemToOrderLine(tr, it);
                    }
                    return;
                }
            }
            if (sku.length < 1) {
                hint.textContent = '';
                tr.setAttribute('data-inv-id', '');
                return;
            }
            const prevInv = tr.getAttribute('data-inv-id') || '';
            const items = await fetchInventoryTrackSuggest(sku);
            const exact = items.find((i) => String(i.sku || '').trim().toLowerCase() === sku.toLowerCase());
            if (exact) {
                const newId = String(exact.id);
                tr.setAttribute('data-inv-id', newId);
                hint.textContent = formatSkuRowHint(exact);
                if (prevInv !== newId) {
                    applyInventoryItemToOrderLine(tr, exact);
                }
            } else {
                tr.setAttribute('data-inv-id', '');
                hint.textContent = sku.length >= 2 ? T.orderLinesSkuNotFound : '';
            }
        }

        function bindSkuRow(tr) {
            if (tr.dataset.skuBound === '1') return;
            tr.dataset.skuBound = '1';
            const inp = tr.querySelector('.ol-sku');
            const dd = tr.querySelector('.ol-sku-dd');
            if (!inp || !dd) return;

            inp.addEventListener('input', () => {
                if (inp.readOnly) return;
                tr.setAttribute('data-inv-id', '');
                const T = trackT();
                const q = String(inp.value || '').trim();
                const hint = tr.querySelector('.ol-sku-hint');
                if (hint) {
                    if (q.length === 0) hint.textContent = '';
                    else if (q.length === 1) hint.textContent = T.orderLinesSkuTypeMore;
                    else hint.textContent = '';
                }
                clearTimeout(tr._fvSkuTimer);
                if (q.length < 1) {
                    dd.classList.remove('is-open');
                    dd.innerHTML = '';
                    return;
                }
                tr._fvSkuTimer = setTimeout(async () => {
                    const items = await fetchInventoryTrackSuggest(q);
                    if (String(inp.value || '').trim() !== q) return;
                    renderSkuDropdown(tr, items);
                }, 280);
            });

            inp.addEventListener('focus', async () => {
                if (inp.readOnly) return;
                const q = String(inp.value || '').trim();
                if (q.length < 1) return;
                const items = await fetchInventoryTrackSuggest(q);
                if (String(inp.value || '').trim() !== q) return;
                renderSkuDropdown(tr, items);
            });

            inp.addEventListener('blur', () => {
                setTimeout(() => {
                    if (!tr.contains(document.activeElement)) {
                        dd.classList.remove('is-open');
                    }
                    refreshSkuHintForRow(tr).catch(() => {});
                }, 160);
            });
        }

        function bindOrderSkuHelpers(tbody) {
            if (!tbody) return;
            tbody.querySelectorAll('tr').forEach((tr) => {
                bindSkuRow(tr);
                refreshSkuHintForRow(tr).catch(() => {});

        document.addEventListener('click', (e) => {
            if (e.target.closest && e.target.closest('.ol-sku-cell')) return;
            document.querySelectorAll('.ol-sku-dd.is-open').forEach((dd) => {
                dd.classList.remove('is-open');
                dd.innerHTML = '';

        function fillOrderLinesTbody(tbody, lines) {
            tbody.innerHTML = lines.map((ln) => orderLineRowHtml(ln)).join('');
            tbody.querySelectorAll('.track-order-line-del').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const tr = btn.closest('tr');
                    if (tr && tbody.querySelectorAll('tr').length > 1) tr.remove();
                });
            });
            bindOrderSkuHelpers(tbody);
        }

        function collectOrderLinesFromTbody(tbody) {
            const rows = Array.from(tbody.querySelectorAll('tr'));
            const out = [];
            for (const tr of rows) {
                const name = String(tr.querySelector('.ol-name')?.value || '').trim();
                if (name === '') continue;
                const qty = parseFloat(tr.querySelector('.ol-qty')?.value) || 1;
                const purchase = parseFloat(tr.querySelector('.ol-purchase')?.value) || 0;
                const sale = parseFloat(tr.querySelector('.ol-sale')?.value) || 0;
                const sku = String(tr.querySelector('.ol-sku')?.value || '').trim();
                const dedEl = tr.querySelector('.ol-deduct');
                const deductFromStock = !!(dedEl && !dedEl.disabled && dedEl.checked);
                const hadFromStock = tr.getAttribute('data-from-stock') === '1';
                const invAttr = String(tr.getAttribute('data-inv-id') || '').trim();
                const invId = invAttr !== '' ? parseInt(invAttr, 10) : 0;
                const stAttr = String(tr.getAttribute('data-line-status') || '').trim();
                const lineIdAttr = String(tr.getAttribute('data-line-id') || '').trim();
                const line = { name, qty, purchase, sale, sku, deductFromStock };
                if (lineIdAttr !== '') line.line_id = lineIdAttr;
                if (invId > 0) line.inventory_item_id = invId;
                if (hadFromStock) {
                    line.from_stock = true;
                    if (stAttr !== '') line.status = stAttr;
                }
                out.push(line);
            }
            return out;
        }

        async function hydrateTrackOrderBlocks(root) {
            const docIds = new Set();
            root.querySelectorAll('.order-lines-box[data-order-doc-id]').forEach((el) => {
                const id = String(el.getAttribute('data-order-doc-id') || '').trim();
                if (id) docIds.add(id);
            });
            for (const orderDocId of docIds) {
                if (!orderDocDetailFetch.has(orderDocId)) {
                    orderDocDetailFetch.set(orderDocId, fetch(`./api/get_document.php?id=${encodeURIComponent(orderDocId)}&type=order`, {
                        credentials: 'same-origin',
                        cache: 'no-store',
                    }).then((r) => r.json()).catch(() => null));
                }
            }
            for (const orderDocId of docIds) {
                const json = await orderDocDetailFetch.get(orderDocId);
                const doc = json && json.success ? (json.data || {}) : {};
                root.querySelectorAll('.order-lines-box').forEach((box) => {
                    if (String(box.getAttribute('data-order-doc-id') || '') !== orderDocId) return;
                    const tbody = box.querySelector('.order-lines-tbody');
                    if (!tbody) return;
                    fillOrderLinesTbody(tbody, parseOrderLinesFromDoc(doc));
                });
                root.querySelectorAll('.order-display-title').forEach((el) => {
                    if (String(el.getAttribute('data-order-doc-id') || '') !== orderDocId) return;
                    el.textContent = resolveTrackCardTitle(doc);
                });
                root.querySelectorAll('.order-display-meta').forEach((el) => {
                    if (String(el.getAttribute('data-order-doc-id') || '') !== orderDocId) return;
                    el.textContent = resolveTrackCardMeta(doc, trackT());
                });
                root.querySelectorAll('.track-work-wrap[data-order-doc-id]').forEach((wrap) => {
                    if (String(wrap.getAttribute('data-order-doc-id') || '') !== orderDocId) return;
                    wrap.classList.toggle('is-hidden', !shouldShowTrackWorkCost(doc));
                    const inp = wrap.querySelector('.track-public-estimated-cost');
                    if (inp && document.activeElement !== inp) {
                        inp.value = String(doc.public_estimated_cost || '').trim();
                    }
                });
            }
        }

        function bindOrderLinesControls(root) {
            const L = trackT();
            root.querySelectorAll('.track-order-line-add').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const box = btn.closest('.order-lines-box');
                    const tbody = box && box.querySelector('.order-lines-tbody');
                    if (!tbody) return;
                    const wrap = document.createElement('div');
                    wrap.innerHTML = '<table><tbody>' + orderLineRowHtml({ name: '', qty: 1, purchase: 0, sale: 0, sku: '', fromStockDone: false, deductFromStock: false }) + '</tbody></table>';
                    const newRow = wrap.querySelector('tr');
                    if (!newRow) return;
                    tbody.appendChild(newRow);
                    newRow.querySelector('.track-order-line-del')?.addEventListener('click', () => {
                        if (tbody.querySelectorAll('tr').length > 1) newRow.remove();
                    });
                    bindSkuRow(newRow);
                    refreshSkuHintForRow(newRow).catch(() => {});
                });
            });
            root.querySelectorAll('.track-order-lines-save').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const box = btn.closest('.order-lines-box');
                    const orderDocId = String(box?.getAttribute('data-order-doc-id') || '');
                    const tbody = box?.querySelector('.order-lines-tbody');
                    if (!orderDocId || !tbody) return;
                    for (const tr of tbody.querySelectorAll('tr')) {
                        await refreshSkuHintForRow(tr);
                    }
                    const orderLines = collectOrderLinesFromTbody(tbody);
                    if (orderLines.length === 0) {
                        alert('Добавьте хотя бы одну позицию с названием');
                        return;
                    }
                    const oldText = btn.textContent;
                    btn.disabled = true;
                    btn.textContent = L.orderLinesSaving;
                    try {
                        const res = await fetch('./api/order_track_order_lines.php', {
                            method: 'POST',
                            credentials: 'same-origin',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ documentId: orderDocId, orderLines }),
                        });
                        const json = await res.json();
                        if (!json || json.success !== true) throw new Error(json?.message || 'Ошибка');
                        orderDocDetailFetch.delete(orderDocId);
                        const msg = [L.orderLinesSaved];
                        if (Array.isArray(json.deduct_notes) && json.deduct_notes.length) msg.push(json.deduct_notes.join('\n'));
                        if (json.warehouse_warning) msg.push('Склад: ' + json.warehouse_warning);
                        if (json.supply_warning) msg.push('Поставки: ' + json.supply_warning);
                        alert(msg.join('\n\n'));
                        await loadAll();
                    } catch (e) {
                        alert(e.message || 'Ошибка сохранения');
                    } finally {
                        btn.disabled = false;
                        btn.textContent = oldText;
                    }
                });
            });
        }

        async function loadAll(){
            orderDocDetailFetch.clear();
            const res = await fetch('./api/get_all_documents.php?type=all', { credentials:'same-origin', cache:'no-store' });
            const json = await res.json();
            const rows = pickRows(json);
            state.docs = rows;
            state.groups = groupDocuments(rows);
            renderSidebar();
            renderDetails();
        }
        async function viewDoc(id, type){
            try { const data = await FixariVanDocuments.fetchDocument(id, type); FixariVanDocuments.showViewModal(data, type); }
            catch (e) { alert(e.message || 'Ошибка просмотра'); }
        }
        async function editDoc(id, type){
            if (type === 'invoice') {
                window.location.href = `invoice.html?document_id=${encodeURIComponent(id)}`;
                return;
            }
            try { const data = await FixariVanDocuments.fetchDocument(id, type); FixariVanDocuments.showEditModal(data, type, () => loadAll()); }
            catch (e) { alert(e.message || 'Ошибка редактирования'); }
        }
        async function pdfDoc(id, type, btn){
            try { await FixariVanDocuments.exportDocument(id, type, btn); } catch (e) { alert(e.message || 'Ошибка PDF'); }
        }
        window.viewDoc = viewDoc; window.editDoc = editDoc; window.pdfDoc = pdfDoc;

        function rerenderFromInputs() {
            savePrefs();
            renderSidebar();
            renderDetails();
        }
        document.getElementById('btnSearch').addEventListener('click', rerenderFromInputs);
        document.getElementById('qGlobal').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); rerenderFromInputs(); } });
        document.getElementById('qGlobal').addEventListener('input', () => {
            savePrefs();
            if (qGlobalDebounce) clearTimeout(qGlobalDebounce);
            qGlobalDebounce = setTimeout(() => { renderSidebar(); renderDetails(); }, 280);
        });
        document.getElementById('fAll').addEventListener('click', () => setMode('all'));
        document.getElementById('fActive').addEventListener('click', () => setMode('active'));
        document.getElementById('fWait').addEventListener('click', () => setMode('wait'));
        document.getElementById('fDone').addEventListener('click', () => setMode('done'));

        document.addEventListener('DOMContentLoaded', () => {
            applyTrackStaticI18n();
            loadPrefs();
            try {
                const qFromUrl = new URLSearchParams(window.location.search).get('q');
                if (qFromUrl) {
                    const qEl = document.getElementById('qGlobal');
                    if (qEl) qEl.value = qFromUrl;
                }
            } catch (_) {}
            setMode(state.mode);
            loadAll().catch((e) => {
                document.getElementById('clientsList').innerHTML = '<div class="muted">Ошибка загрузки: ' + esc(e.message || '') + '</div>';
            });
        });
    </script>
</body>
</html>
